<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운영진 대시보드 - 글로벌창업지원네트워크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10 text-slate-800">
    <div class="max-w-4xl mx-auto">
        <!-- 상단 헤더 -->
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-bold text-blue-900 flex items-center gap-2">
                    <i data-lucide="settings"></i> 운영진 대시보드
                </h1>
                <p class="text-slate-500 text-sm mt-1">글과 사진이 자연스럽게 어우러지는 공지를 작성하세요.</p>
            </div>
            <div id="auth-status" class="hidden flex items-center gap-4">
                <span id="user-info" class="text-xs text-slate-400 font-medium"></span>
                <button id="logout-btn" class="text-sm font-bold text-red-500 hover:text-red-700 transition underline">로그아웃</button>
            </div>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-200">
            <h2 class="text-xl font-bold mb-8 text-center text-slate-800">관리자 로그인</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">이메일</label>
                    <input type="text" id="email" value="" placeholder=" " autocomplete="one-time-code" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition bg-white shadow-inner">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">비밀번호</label>
                    <input type="password" id="password" value="" placeholder=" " autocomplete="new-password" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition bg-white shadow-inner">
                </div>
                <button id="login-btn" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition shadow-lg mt-4 text-lg">로그인</button>
                <button onclick="location.href='index.html'" class="w-full text-sm text-slate-400 mt-6 hover:underline text-center">홈페이지로 돌아가기</button>
            </div>
        </div>

        <!-- 관리자 기능 섹션 -->
        <div id="admin-content" class="hidden space-y-8">
            <!-- 글쓰기/수정 폼 -->
            <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-blue-100">
                <h2 id="form-title" class="text-xl font-bold mb-8 text-blue-900 flex items-center gap-2">
                    <i data-lucide="pen-tool"></i> 공지사항 작성 및 수정
                </h2>
                <div class="space-y-6">
                    <input type="hidden" id="edit-id">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">공지 제목</label>
                        <input type="text" id="notice-title" placeholder="공고 제목을 입력하세요" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 transition">
                    </div>
                    
                    <!-- 사진 삽입 도구 -->
                    <div class="p-6 bg-blue-50 rounded-3xl border border-blue-100 shadow-inner">
                        <label class="block text-sm font-bold text-blue-800 mb-3 flex items-center gap-2">
                            <i data-lucide="image-plus" class="w-4 h-4"></i> 본문 내 사진 삽입 도구
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="image-helper-url" placeholder="여기에 사진 주소를 붙여넣으세요" class="flex-1 p-4 rounded-xl border border-blue-200 outline-none focus:border-blue-500 bg-white">
                            <button id="insert-image-btn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition">본문에 삽입</button>
                        </div>
                        <p class="text-[11px] text-blue-500 mt-4 leading-relaxed font-medium">
                            * 본문 작성 중 사진이 들어갈 자리에 커서를 두고 버튼을 누르세요. <br>
                            * 사진 주소가 괄호 `]`로 끝나도록 정확히 삽입됩니다.
                        </p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">공지 내용</label>
                        <textarea id="notice-content" rows="18" placeholder="공고 소개 내용을 자유롭게 작성하세요." class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 leading-relaxed transition"></textarea>
                    </div>
                    
                    <div class="flex gap-2 pt-4">
                        <button id="save-btn" class="flex-1 bg-blue-600 text-white p-5 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg text-lg">게시물 저장하기</button>
                        <button id="cancel-edit-btn" class="hidden px-8 bg-slate-100 text-slate-500 p-5 rounded-2xl font-bold hover:bg-slate-200 transition text-lg">취소</button>
                    </div>
                </div>
            </div>

            <!-- 관리 리스트 -->
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 py-6 border-b bg-slate-50 flex justify-between items-center">
                    <h2 class="font-bold text-slate-700">관리 리스트</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-xs text-slate-400 font-bold uppercase tracking-wider">
                            <tr><th class="px-8 py-5">제목</th><th class="px-8 py-5 text-center">관리</th></tr>
                        </thead>
                        <tbody id="manage-list" class="divide-y divide-slate-100 bg-white text-sm">
                            <tr><td colspan="2" class="p-10 text-center text-slate-400 italic font-medium">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBz60TBGXkTwHhJ1LmBN0ZXdyM34_ndS_A",
            authDomain: "gsn-network.firebaseapp.com",
            projectId: "gsn-network",
            storageBucket: "gsn-network.firebasestorage.app",
            messagingSenderId: "1065753363903",
            appId: "1:1065753363903:web:bd8445b241e658a3becd0a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "gsn-network";

        const contentArea = document.getElementById('notice-content');

        document.getElementById('insert-image-btn').onclick = () => {
            const url = document.getElementById('image-helper-url').value.trim();
            if(!url) return alert("이미지 주소를 먼저 입력하세요.");
            const tag = `[이미지:${url}]`;
            const start = contentArea.selectionStart;
            const text = contentArea.value;
            contentArea.value = text.substring(0, start) + tag + text.substring(contentArea.selectionEnd);
            document.getElementById('image-helper-url').value = "";
            contentArea.focus();
            contentArea.setSelectionRange(start + tag.length, start + tag.length);
        };

        onAuthStateChanged(auth, (user) => {
            lucide.createIcons();
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                document.getElementById('auth-status').classList.remove('hidden');
                document.getElementById('user-info').innerText = user.email + " (접속 중)";
                loadManageList();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
                document.getElementById('auth-status').classList.add('hidden');
                document.getElementById('email').value = "";
                document.getElementById('password').value = "";
            }
        });

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if(!email || !pwd) return alert("정보를 모두 입력해 주세요.");
            try { await signInWithEmailAndPassword(auth, email, pwd); } catch (e) { alert("로그인 정보가 틀렸습니다."); }
        };

        document.getElementById('logout-btn').onclick = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth); };

        function loadManageList() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `<tr class="border-b last:border-0 hover:bg-slate-50 transition">
                        <td class="px-8 py-5 font-bold text-slate-800">${data.title}</td>
                        <td class="px-8 py-5 text-center space-x-2 whitespace-nowrap">
                            <button onclick="window.editNotice('${doc.id}')" class="text-xs bg-slate-900 text-white px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-700 transition">수정</button>
                            <button onclick="window.deleteNotice('${doc.id}')" class="text-xs bg-red-50 text-red-500 px-4 py-2 rounded-xl font-bold hover:bg-red-100 transition">삭제</button>
                        </td>
                    </tr>`;
                });
                document.getElementById('manage-list').innerHTML = html || '<tr><td colspan="2" class="p-10 text-center font-medium">등록된 공지가 없습니다.</td></tr>';
            });
        }

        document.getElementById('save-btn').onclick = async () => {
            const title = document.getElementById('notice-title').value.trim();
            const content = contentArea.value;
            const editId = document.getElementById('edit-id').value;
            if (!title) return alert("제목을 입력해 주세요.");
            try {
                const today = new Date();
                const dateStr = `${today.getFullYear()}. ${String(today.getMonth() + 1).padStart(2, '0')}. ${String(today.getDate()).padStart(2, '0')}`;
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', editId), { title, content, updatedAt: serverTimestamp() });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), { title, content, date: dateStr, createdAt: serverTimestamp() });
                }
                alert("성공적으로 저장되었습니다."); window.resetForm();
            } catch (e) { alert("저장 실패: " + e.message); }
        };

        window.editNotice = async (id) => {
            const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('notice-title').value = data.title;
                contentArea.value = data.content || "";
                document.getElementById('edit-id').value = id;
                document.getElementById('form-title').innerText = "게시물 수정 중";
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.deleteNotice = async (id) => { if (confirm("정말 삭제하시겠습니까?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id)); };
        window.resetForm = () => {
            document.getElementById('notice-title').value = ""; contentArea.value = ""; document.getElementById('edit-id').value = "";
            document.getElementById('form-title').innerText = "공지사항 작성 및 수정"; document.getElementById('cancel-edit-btn').classList.add('hidden');
        };
        document.getElementById('cancel-edit-btn').onclick = window.resetForm;
        lucide.createIcons();
    </script>
</body>
</html>
