<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 전용 공지사항 등록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900">운영진 전용 페이지</h1>
            <p class="text-slate-500 text-sm mt-2">공지사항을 작성하는 곳입니다.</p>
        </div>

        <!-- 로그인 화면 -->
        <div id="login-section" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">관리자 이메일</label>
                <input type="email" id="email" placeholder="admin@admin.com" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">비밀번호</label>
                <input type="password" id="password" placeholder="******" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500">
            </div>
            <button id="login-btn" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold hover:bg-slate-800 transition mt-4">로그인하기</button>
            <button onclick="location.href='index.html'" class="w-full text-sm text-slate-400 mt-4 hover:underline text-center">홈페이지로 돌아가기</button>
        </div>

        <!-- 공지사항 등록 화면 -->
        <div id="write-section" class="hidden space-y-4">
            <div class="bg-blue-50 p-4 rounded-lg mb-4 text-sm text-blue-800 text-center">
                로그인 성공! 새로운 공지사항을 작성해주세요.
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">공지 제목</label>
                <input type="text" id="notice-title" placeholder="예: 홈페이지 정식 오픈 안내" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">공지 내용</label>
                <textarea id="notice-content" rows="6" placeholder="공지사항 상세 내용을 적어주세요." class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500"></textarea>
            </div>
            <button id="post-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">게시판에 등록하기</button>
            <button id="logout-btn" class="w-full text-sm text-slate-400 mt-4 hover:underline text-center">로그아웃</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBz60TBGXkTwHhJ1LmBN0ZXdyM34_ndS_A",
            authDomain: "gsn-network.firebaseapp.com",
            projectId: "gsn-network",
            storageBucket: "gsn-network.firebasestorage.app",
            messagingSenderId: "1065753363903",
            appId: "1:1065753363903:web:bd8445b241e658a3becd0a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginSection = document.getElementById('login-section');
        const writeSection = document.getElementById('write-section');
        const loginBtn = document.getElementById('login-btn');
        const postBtn = document.getElementById('post-btn');
        const logoutBtn = document.getElementById('logout-btn');

        // 로그인 처리
        loginBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            if (!email || !pwd) return alert('이메일과 비밀번호를 입력해주세요.');
            
            loginBtn.innerText = "로그인 중...";
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
            } catch (error) {
                alert("로그인 실패! 이메일과 비밀번호를 다시 확인하세요.");
                loginBtn.innerText = "로그인하기";
            }
        };

        // 인증 상태 감시
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.classList.add('hidden');
                writeSection.classList.remove('hidden');
            } else {
                loginSection.classList.remove('hidden');
                writeSection.classList.add('hidden');
            }
        });

        // 로그아웃
        logoutBtn.onclick = () => signOut(auth);

        // 공지사항 등록
        postBtn.onclick = async () => {
            const title = document.getElementById('notice-title').value;
            const content = document.getElementById('notice-content').value;
            if (!title) return alert("제목을 입력해주세요!");

            postBtn.innerText = "등록 중...";
            try {
                const today = new Date();
                const dateString = `${today.getFullYear()}. ${String(today.getMonth() + 1).padStart(2, '0')}. ${String(today.getDate()).padStart(2, '0')}`;

                // Firestore에 데이터 추가
                await addDoc(collection(db, "notices"), {
                    title: title,
                    content: content,
                    date: dateString,
                    createdAt: serverTimestamp()
                });

                alert("공지사항이 성공적으로 등록되었습니다!");
                document.getElementById('notice-title').value = "";
                document.getElementById('notice-content').value = "";
                postBtn.innerText = "게시판에 등록하기";
            } catch (error) {
                console.error("에러 발생:", error);
                alert("등록에 실패했습니다. 파이어베이스 [규칙] 탭에서 allow read, write: if true; 설정을 확인해주세요!");
                postBtn.innerText = "게시판에 등록하기";
            }
        };
    </script>
</body>
</html>
