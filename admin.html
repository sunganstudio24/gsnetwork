<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 글로벌창업지원네트워크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <!-- 상단 헤더 -->
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-blue-900 flex items-center gap-2">
                    <i data-lucide="settings"></i> 운영진 대시보드
                </h1>
                <p class="text-slate-500 text-sm mt-1">공지사항을 작성하고 관리하는 공간입니다.</p>
            </div>
            <div id="auth-status" class="hidden flex items-center gap-4">
                <span id="user-info" class="text-xs text-slate-400"></span>
                <button id="logout-btn" class="text-sm font-bold text-red-500 hover:underline">로그아웃</button>
            </div>
        </div>

        <!-- 로그인 섹션 -->
        <div id="login-section" class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-xl font-bold mb-6 text-center text-slate-800">관리자 로그인</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">이메일</label>
                    <!-- placeholder를 수정하고 자동완성을 방지합니다 -->
                    <input type="email" id="email" placeholder="관리자 이메일을 입력하세요" autocomplete="off" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500">
                </div>
                <button id="login-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">로그인</button>
                <button onclick="location.href='index.html'" class="w-full text-sm text-slate-400 mt-2 hover:underline text-center">홈페이지로 돌아가기</button>
            </div>
        </div>

        <!-- 관리자 기능 섹션 (로그인 시 보임) -->
        <div id="admin-content" class="hidden space-y-8">
            <!-- 글쓰기/수정 폼 -->
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-blue-100">
                <h2 id="form-title" class="text-xl font-bold mb-6 text-blue-900 flex items-center gap-2">
                    <i data-lucide="pen-tool"></i> 새 공지사항 작성
                </h2>
                <div class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">공지 제목</label>
                        <input type="text" id="notice-title" placeholder="공지 제목을 입력하세요" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">공지 내용</label>
                        <textarea id="notice-content" rows="6" placeholder="상세 내용을 입력하세요" class="w-full px-4 py-3 rounded-lg border border-slate-200 outline-none focus:border-blue-500"></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button id="save-btn" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">게시물 등록</button>
                        <button id="cancel-edit-btn" class="hidden px-6 bg-slate-100 text-slate-500 py-4 rounded-xl font-bold hover:bg-slate-200 transition">취소</button>
                    </div>
                </div>
            </div>

            <!-- 게시물 목록 관리 -->
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b bg-slate-50 flex justify-between items-center">
                    <h2 class="font-bold text-slate-700">게시물 관리 리스트</h2>
                    <span class="text-xs text-slate-400">최신순으로 정렬됩니다.</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-xs text-slate-400 uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">제목</th>
                                <th class="px-6 py-4">날짜</th>
                                <th class="px-6 py-4 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody id="manage-list" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="3" class="px-6 py-10 text-center text-slate-400">불러오는 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 파이어베이스 설정 (지호님 설정 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyBz60TBGXkTwHhJ1LmBN0ZXdyM34_ndS_A",
            authDomain: "gsn-network.firebaseapp.com",
            projectId: "gsn-network",
            storageBucket: "gsn-network.firebasestorage.app",
            messagingSenderId: "1065753363903",
            appId: "1:1065753363903:web:bd8445b241e658a3becd0a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginSection = document.getElementById('login-section');
        const adminContent = document.getElementById('admin-content');
        const authStatus = document.getElementById('auth-status');
        const manageList = document.getElementById('manage-list');
        const saveBtn = document.getElementById('save-btn');
        const cancelBtn = document.getElementById('cancel-edit-btn');
        const formTitle = document.getElementById('form-title');

        let isEditing = false;

        // 1. 로그인 상태 감시
        onAuthStateChanged(auth, (user) => {
            lucide.createIcons();
            if (user) {
                loginSection.classList.add('hidden');
                adminContent.classList.remove('hidden');
                authStatus.classList.remove('hidden');
                document.getElementById('user-info').innerText = user.email + " 접속 중";
                loadManageList();
            } else {
                loginSection.classList.remove('hidden');
                adminContent.classList.add('hidden');
                authStatus.classList.add('hidden');
            }
        });

        // 2. 로그인 및 로그아웃
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
            } catch (error) {
                alert("로그인 실패: 이메일 또는 비밀번호가 틀렸습니다.");
            }
        };

        document.getElementById('logout-btn').onclick = () => {
            if(confirm("로그아웃 하시겠습니까?")) signOut(auth);
        };

        // 3. 관리자용 리스트 불러오기 (실시간)
        function loadManageList() {
            const q = query(collection(db, "notices"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-medium text-slate-800">${data.title}</td>
                            <td class="px-6 py-4 text-xs text-slate-400">${data.date}</td>
                            <td class="px-6 py-4 text-center space-x-2 whitespace-nowrap">
                                <button onclick="editNotice('${doc.id}')" class="text-xs bg-slate-900 text-white px-3 py-1.5 rounded-lg hover:bg-slate-700">수정</button>
                                <button onclick="deleteNotice('${doc.id}')" class="text-xs bg-red-50 text-red-500 px-3 py-1.5 rounded-lg hover:bg-red-100">삭제</button>
                            </td>
                        </tr>`;
                });
                manageList.innerHTML = html || '<tr><td colspan="3" class="px-6 py-10 text-center text-slate-400">등록된 공지가 없습니다.</td></tr>';
            });
        }

        // 4. 게시물 등록 및 수정 저장
        saveBtn.onclick = async () => {
            const title = document.getElementById('notice-title').value;
            const content = document.getElementById('notice-content').value;
            const editId = document.getElementById('edit-id').value;

            if (!title || !content) return alert("제목과 내용을 모두 입력해주세요.");

            saveBtn.innerText = "처리 중...";
            saveBtn.disabled = true;

            try {
                const today = new Date();
                const dateString = `${today.getFullYear()}. ${String(today.getMonth() + 1).padStart(2, '0')}. ${String(today.getDate()).padStart(2, '0')}`;

                if (isEditing && editId) {
                    // 수정 모드
                    await updateDoc(doc(db, "notices", editId), {
                        title: title,
                        content: content,
                        updatedAt: serverTimestamp()
                    });
                    alert("수정이 완료되었습니다.");
                } else {
                    // 신규 등록 모드
                    await addDoc(collection(db, "notices"), {
                        title: title,
                        content: content,
                        date: dateString,
                        createdAt: serverTimestamp()
                    });
                    alert("성공적으로 등록되었습니다.");
                }
                resetForm();
            } catch (error) {
                alert("오류가 발생했습니다: " + error.message);
            } finally {
                saveBtn.innerText = isEditing ? "수정 내용 저장" : "게시물 등록";
                saveBtn.disabled = false;
            }
        };

        // 5. 전역 함수 설정 (수정 및 삭제 버튼용)
        window.editNotice = async (id) => {
            try {
                const docSnap = await getDoc(doc(db, "notices", id));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('notice-title').value = data.title;
                    document.getElementById('notice-content').value = data.content;
                    document.getElementById('edit-id').value = id;
                    
                    isEditing = true;
                    formTitle.innerHTML = `<i data-lucide="edit"></i> 게시물 수정 중`;
                    saveBtn.innerText = "수정 내용 저장";
                    saveBtn.classList.replace('bg-blue-600', 'bg-indigo-600');
                    cancelBtn.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    lucide.createIcons();
                }
            } catch (e) { alert("불러오기 실패"); }
        };

        window.deleteNotice = async (id) => {
            if (confirm("정말로 이 게시물을 삭제하시겠습니까? 복구할 수 없습니다.")) {
                try {
                    await deleteDoc(doc(db, "notices", id));
                    alert("삭제되었습니다.");
                    if(isEditing && document.getElementById('edit-id').value === id) resetForm();
                } catch (e) { alert("삭제 실패"); }
            }
        };

        window.resetForm = () => {
            document.getElementById('notice-title').value = "";
            document.getElementById('notice-content').value = "";
            document.getElementById('edit-id').value = "";
            isEditing = false;
            formTitle.innerHTML = `<i data-lucide="pen-tool"></i> 새 공지사항 작성`;
            saveBtn.innerText = "게시물 등록";
            saveBtn.classList.replace('bg-indigo-600', 'bg-blue-600');
            cancelBtn.classList.add('hidden');
            lucide.createIcons();
        };

        cancelBtn.onclick = resetForm;
        lucide.createIcons();
    </script>
</body>
</html>
