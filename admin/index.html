<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSN MASTER DASHBOARD - 운영진 전용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        /* 에디터 스타일 */
        #editor {
            min-height: 500px; padding: 3rem; outline: none; background: #ffffff;
            line-height: 1.8; font-size: 11pt; color: #334155;
            border-radius: 1.5rem; border: 2px solid #f1f5f9; transition: all 0.2s ease;
            box-sizing: border-box; word-break: break-all; overflow-wrap: break-word; position: relative;
        }
        #editor:focus { border-color: #0f172a; box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.1); }
        
        #editor img { 
            max-width: 100% !important; border-radius: 8px; margin: 0.5rem; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            cursor: move; -webkit-user-drag: element; user-drag: element;
        }
        #editor img.selected-img { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4); }
        #editor ul { list-style-type: disc; padding-left: 1.5rem; margin: 1rem 0; }
        
        /* UI 요소 스타일 */
        .admin-tab { padding: 14px 28px; font-weight: 800; cursor: pointer; color: #94a3b8; transition: 0.2s; border-bottom: 3px solid transparent; }
        .admin-tab.active { color: #0f172a; border-bottom-color: #0f172a; }
        
        .sub-tab-btn { padding: 8px 20px; border-radius: 12px; font-weight: 800; font-size: 13px; transition: 0.2s; border: 1px solid #e2e8f0; background: white; color: #94a3b8; }
        .sub-tab-btn.active { background: #0f172a; color: white; border-color: #0f172a; }

        .toolbar-group { display: flex; align-items: center; background: #f8fafc; border-radius: 0.75rem; padding: 4px; gap: 2px; border: 1px solid #f1f5f9; }
        .toolbar-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; transition: all 0.2s; color: #64748b; cursor: pointer; }
        .toolbar-btn:hover { background: #ffffff; color: #0f172a; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .toolbar-btn.active { background: #0f172a; color: #ffffff; } 
        
        .font-size-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0 4px 0 8px; height: 38px; }
        .font-size-input { width: 36px; border: none; outline: none; font-weight: 800; text-align: center; font-size: 0.9rem; background: transparent; }
        .font-size-input::-webkit-outer-spin-button, .font-size-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        #font-size-popup { 
            display: none; position: absolute; top: calc(100% + 8px); left: 0; width: 100%; min-width: 65px;
            z-index: 100; background: white; border: 1px solid #cbd5e1; border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-height: 250px; overflow-y: auto; padding: 4px 0; 
        }
        #font-size-popup.show { display: block; }
        #font-size-popup::-webkit-scrollbar { width: 4px; }
        #font-size-popup::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .font-size-item { padding: 8px 0; font-size: 13px; font-weight: 700; color: #475569; cursor: pointer; text-align: center; transition: all 0.2s; }
        .font-size-item:hover { background-color: #f1f5f9; color: #0f172a; }

        .color-palette-wrap { position: relative; }
        .custom-trigger { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0; }
        #color-popup { 
            display: none; position: absolute; top: 50px; left: -140px; z-index: 100; 
            background: white; border: 1px solid #cbd5e1; border-radius: 12px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.2); padding: 16px; width: 320px; 
        }
        #color-popup.show { display: block; }
        .color-section-title { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .color-grid-theme { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin-bottom: 16px; }
        .color-grid-standard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
        .color-cell { width: 100%; aspect-ratio: 1; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.1s; }
        .color-cell:hover { transform: scale(1.2); z-index: 10; border-color: rgba(0,0,0,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        
        #upload-progress { display: none; width: 100%; height: 4px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin-top: 10px; }
        #upload-bar { width: 0%; height: 100%; background: #0f172a; transition: width 0.3s; }

        /* 8방향 이미지 리사이즈 오버레이 디자인 */
        #img-resize-overlay { display: none; position: absolute; border: 2px solid #3b82f6; z-index: 40; pointer-events: none; }
        .resize-handle { position: absolute; width: 12px; height: 12px; background: white; border: 2px solid #3b82f6; pointer-events: auto; }
        .handle-nw { top: -7px; left: -7px; cursor: nwse-resize; }
        .handle-ne { top: -7px; right: -7px; cursor: nesw-resize; }
        .handle-sw { bottom: -7px; left: -7px; cursor: nesw-resize; }
        .handle-se { bottom: -7px; right: -7px; cursor: nwse-resize; }

        .applicant-card { background: white; border-radius: 2rem; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.02); transition: all 0.3s; }
        .applicant-card:hover { border-color: #0f172a; transform: translateY(-3px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        .search-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 44px; transition: all 0.2s; }
        .search-box:focus-within { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05); }
        .search-input { border: none; outline: none; padding-left: 8px; font-size: 0.9rem; font-weight: 600; width: 100%; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10 relative">

    <div id="custom-modal" class="hidden fixed inset-0 z-[9999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div id="modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h3 id="modal-title" class="text-xl font-black text-[#0f172a] mb-2">알림</h3>
            <p id="modal-desc" class="text-slate-500 font-bold mb-8 whitespace-pre-wrap leading-relaxed"></p>
            <div id="modal-buttons" class="flex gap-3 justify-center"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-[#0f172a] p-8 rounded-[2.5rem] shadow-2xl text-white">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center"><i data-lucide="shield-check" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white uppercase italic">GSN MASTER.</h1>
                    <p class="text-blue-300/60 text-[10px] font-bold uppercase tracking-widest mt-0.5">Control Tower</p>
                </div>
            </div>
            <div id="auth-status" class="hidden">
                <button id="logout-btn" type="button" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-xl text-sm font-bold transition border border-white/10">LOGOUT</button>
            </div>
        </div>

        <div id="login-section" class="max-w-md mx-auto bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black mb-8 text-center text-[#0f172a] uppercase italic">System Access</h2>
            <div id="login-form" class="space-y-5">
                <input type="text" id="admin_id_input" placeholder="ADMIN ID" autocomplete="off" class="w-full p-4 rounded-2xl border-2 border-slate-50 outline-none focus:border-[#0f172a] bg-slate-50 transition font-bold text-sm">
                <input type="text" id="admin_pw_input" placeholder="PASSWORD" autocomplete="off" spellcheck="false" style="-webkit-text-security: disc;" class="w-full p-4 rounded-2xl border-2 border-slate-50 outline-none focus:border-[#0f172a] bg-slate-50 transition font-bold">
                <button id="login-btn" type="button" onclick="window.executeLogin()" class="w-full bg-[#0f172a] text-white p-5 rounded-2xl font-black text-lg hover:bg-black transition shadow-xl uppercase">Login</button>
            </div>
        </div>

        <div id="admin-content" class="hidden space-y-8 fade-in">
            <div class="flex gap-4 border-b border-slate-200 mb-8">
                <div onclick="window.switchTab('notice')" id="tab-notice" class="admin-tab active">📢 공지사항 관리</div>
                <div onclick="window.switchTab('applicant')" id="tab-applicant" class="admin-tab">👥 지원자 통합 관리</div>
            </div>

            <!-- 공지사항 관리 섹션 -->
            <div id="section-notice" class="space-y-8">
                <div class="flex items-center gap-3 px-2">
                    <button onclick="window.switchNoticeSubTab('list')" id="subtab-notice-list" class="sub-tab-btn active">글 목록</button>
                    <button onclick="window.switchNoticeSubTab('write')" id="subtab-notice-write" class="sub-tab-btn">새 글 쓰기</button>
                </div>

                <div id="notice-list-container" class="space-y-6">
                    <div class="flex flex-col md:flex-row justify-between items-center px-2 gap-4">
                        <h3 class="font-black text-slate-400 uppercase text-xs tracking-widest mr-auto">Notice Inventory</h3>
                        
                        <div class="flex items-center gap-2">
                            <select id="manage-category-filter" onchange="window.filterNoticesByCategory(this.value)" class="p-3 border-2 border-slate-50 rounded-xl outline-none focus:border-[#0f172a] bg-white font-bold text-xs shadow-sm">
                                <option value="전체">전체 카테고리</option>
                                <option value="지원공고">📢 지원공고</option>
                                <option value="네트워킹">🤝 네트워킹</option>
                                <option value="일반소식">📰 일반소식</option>
                            </select>
                            
                            <div class="search-box w-64 bg-white shadow-sm">
                                <i data-lucide="search" class="w-4 h-4 text-slate-300"></i>
                                <input type="text" id="notice-search-input" oninput="window.filterNotices(this.value)" placeholder="공지 제목 검색" class="search-input">
                            </div>
                        </div>
                    </div>
                    <div id="manage-list" class="grid md:grid-cols-2 gap-4 pb-20"></div>
                </div>

                <div id="notice-editor-container" class="hidden">
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                        <div class="grid md:grid-cols-3 gap-6 mb-8">
                            <select id="notice-category" class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-[#0f172a] bg-slate-50 font-black">
                                <option value="지원공고">📢 지원공고</option>
                                <option value="네트워킹">🤝 네트워킹</option>
                                <option value="일반소식">📰 일반소식</option>
                            </select>
                            <input type="text" id="notice-title" placeholder="공지 제목을 입력하세요" class="md:col-span-2 w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-[#0f172a] bg-slate-50 font-bold">
                        </div>

                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-6 space-y-4 relative z-20">
                            <div class="flex flex-wrap items-center gap-4">
                                <div class="toolbar-group">
                                    <button id="btn-bold" type="button" onmousedown="event.preventDefault(); window.formatDoc('bold');" class="toolbar-btn" title="굵게"><i data-lucide="bold" class="w-4 h-4"></i></button>
                                    <button type="button" onmousedown="event.preventDefault(); window.formatDoc('insertUnorderedList');" class="toolbar-btn" title="글머리 기호"><i data-lucide="list" class="w-4 h-4"></i></button>
                                </div>
                                <div class="font-size-box relative">
                                    <input type="number" id="font-size-val" value="11" min="1" max="100" onchange="window.applyFontSize(this.value)" class="font-size-input" title="글꼴 크기 직접 입력">
                                    <span class="text-[10px] font-black text-slate-400 mr-2 uppercase">pt</span>
                                    <div class="h-4 w-px bg-slate-200 mx-1"></div>
                                    <div class="relative flex items-center justify-center w-5 h-full cursor-pointer group" onmousedown="event.preventDefault(); window.toggleFontSizePopup();" title="글꼴 크기 선택">
                                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 group-hover:text-slate-700 pointer-events-none transition-colors"></i>
                                    </div>
                                    <div id="font-size-popup" class="fade-in"></div>
                                </div>
                                <div class="toolbar-group">
                                    <button id="btn-align-left" type="button" onmousedown="event.preventDefault(); window.formatDoc('justifyLeft');" class="toolbar-btn" title="왼쪽 정렬"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                                    <button id="btn-align-center" type="button" onmousedown="event.preventDefault(); window.formatDoc('justifyCenter');" class="toolbar-btn" title="가운데 정렬"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                                    <button id="btn-align-right" type="button" onmousedown="event.preventDefault(); window.formatDoc('justifyRight');" class="toolbar-btn" title="오른쪽 정렬"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                                </div>
                                <div class="color-palette-wrap flex items-center gap-2">
                                    <div id="selected-preview" class="custom-trigger bg-black" onmousedown="event.preventDefault(); window.togglePalette();" title="글꼴 색상"></div>
                                    <div id="color-popup" class="fade-in">
                                        <div class="flex justify-between items-center mb-3">
                                            <div class="color-section-title">테마 및 변형 색상</div>
                                            <div onclick="document.getElementById('custom-color-picker').click();" class="p-1 hover:bg-slate-100 rounded cursor-pointer transition" title="스포이트">
                                                <i data-lucide="pipette" class="w-4 h-4 text-slate-500"></i>
                                            </div>
                                        </div>
                                        <div class="color-grid-theme" id="theme-colors-grid"></div>
                                        <div class="color-section-title">표준 색상</div>
                                        <div class="color-grid-standard" id="standard-colors-grid"></div>
                                        <input type="color" id="custom-color-picker" class="hidden" onchange="window.applyColor(this.value)">
                                    </div>
                                </div>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <div class="flex items-center gap-4">
                                    <label class="cursor-pointer bg-[#0f172a] text-white px-6 py-2.5 rounded-lg font-black text-sm hover:bg-black transition-all">이미지 업로드<input type="file" id="image-upload" class="hidden" accept="image/*" multiple onchange="window.handleImageUpload(this)"></label>
                                    <p class="text-xs text-slate-400 font-bold">내 컴퓨터의 사진을 선택하면 본문에 자동 삽입됩니다. (여러 장 선택 가능)</p>
                                </div>
                                <div id="upload-progress"><div id="upload-bar"></div></div>
                            </div>
                        </div>

                        <div class="relative w-full" id="editor-container">
                            <div id="img-toolbar" class="hidden absolute z-50 bg-[#0f172a] text-white rounded-xl shadow-2xl p-1.5 flex items-center gap-1 transition-all border border-slate-700">
                                <button type="button" onmousedown="event.preventDefault(); window.alignImg('left');" class="p-2 hover:bg-slate-700 rounded-lg transition" title="왼쪽 정렬"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                                <button type="button" onmousedown="event.preventDefault(); window.alignImg('center');" class="p-2 hover:bg-slate-700 rounded-lg transition" title="가운데 정렬"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                                <button type="button" onmousedown="event.preventDefault(); window.alignImg('right');" class="p-2 hover:bg-slate-700 rounded-lg transition" title="오른쪽 정렬"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                                <div class="w-px h-5 bg-slate-600 mx-1"></div>
                                <div class="flex items-center px-1"><input type="number" id="img-width-input" class="w-16 h-7 bg-slate-800 text-white text-xs font-bold text-center rounded outline-none border border-slate-600 focus:border-blue-400" onmousedown="event.stopPropagation();" onchange="window.resizeImg(this.value + 'px')"><span class="text-xs ml-1 text-slate-300">px</span></div>
                                <div class="w-px h-5 bg-slate-600 mx-1"></div>
                                <button type="button" onmousedown="event.preventDefault(); window.deleteCurrentImg();" class="p-2 text-red-400 hover:text-white hover:bg-red-500 rounded-lg transition" title="이미지 삭제 (Delete키 가능)"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            <div id="img-resize-overlay"><div class="resize-handle handle-nw" data-pos="nw"></div><div class="resize-handle handle-ne" data-pos="ne"></div><div class="resize-handle handle-sw" data-pos="sw"></div><div class="resize-handle handle-se" data-pos="se"></div></div>
                            <div id="editor" contenteditable="true"></div>
                        </div>
                        
                        <input type="hidden" id="edit-id">
                        <div class="flex gap-4 mt-10">
                            <button id="save-btn" type="button" onclick="window.processSubmit()" class="flex-1 bg-[#0f172a] text-white p-6 rounded-2xl font-black text-xl hover:bg-black transition shadow-xl">등록</button>
                            <button id="cancel-edit-btn" onclick="window.cancelEdit()" type="button" class="hidden px-12 bg-slate-100 text-slate-500 rounded-2xl font-black transition">CANCEL</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="section-applicant" class="hidden space-y-6">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                    <h2 class="text-3xl font-black text-[#0f172a]">지원자 통합 현황</h2>
                    <div class="flex bg-white p-1 rounded-xl border border-slate-200">
                        <button onclick="window.setApplicantType('전체')" class="app-filter-btn active px-4 py-2 rounded-lg text-xs font-black" id="filter-all">전체</button>
                        <button onclick="window.setApplicantType('창업자')" class="app-filter-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400" id="filter-founder">창업자</button>
                        <button onclick="window.setApplicantType('전문가')" class="app-filter-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400" id="filter-expert">전문가</button>
                    </div>
                </div>
                <div id="applicant-list" class="grid gap-6 pb-20"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCr3Gv_Tij97ZOyiScptXxiPnzhZ9XTYc",
            authDomain: "gsnetwork.firebaseapp.com",
            projectId: "gsnetwork",
            storageBucket: "gsnetwork.firebasestorage.app",
            messagingSenderId: "627864872176",
            appId: "1:627864872176:web:cafd0d1dae27097be04e35"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appId = "gsnetwork"; 
        const editor = document.getElementById('editor');

        let allApplicants = [];
        let allNotices = [];
        let noticeSearchTerm = ""; 
        let noticeCategoryFilter = "전체"; 
        let currentApplicantType = '전체';
        let savedRange = null;
        let inactivityTimeout;

        window.isFormatting = false;

        window.saveSelection = () => {
            if (window.isFormatting) return;
            const sel = window.getSelection();
            if (sel.rangeCount > 0 && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }
        };

        window.restoreSelection = () => { 
            if (savedRange) { 
                const sel = window.getSelection(); 
                sel.removeAllRanges(); sel.addRange(savedRange); 
            } else { editor.focus(); }
        };

        window.trackSelection = () => {
            if (window.isFormatting) return;
            if (document.activeElement !== editor) return;
            
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                let node = sel.getRangeAt(0).commonAncestorContainer;
                if (node.nodeType === 3) node = node.parentNode; 
                if (editor.contains(node) || node === editor) window.saveSelection();

                document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
                document.getElementById('btn-align-left').classList.toggle('active', document.queryCommandState('justifyLeft'));
                document.getElementById('btn-align-center').classList.toggle('active', document.queryCommandState('justifyCenter'));
                document.getElementById('btn-align-right').classList.toggle('active', document.queryCommandState('justifyRight'));

                if (node && editor.contains(node)) {
                    const computedStyle = window.getComputedStyle(node);

        // ==========================================
        // [완벽 해결] DOM 파괴 방지 + Range 객체 보존 + Span 중첩 방지
        // ==========================================
        window.applyFontSize = (val) => {
            if (!val) return;
            window.isFormatting = true;
            
            editor.focus(); 
            window.restoreSelection();
            
            const sel = window.getSelection();
            if (!sel.rangeCount) {
                window.isFormatting = false;
                return;
            }
            
            const range = sel.getRangeAt(0);
            
            if (range.collapsed) {
                // 커서 위치에 스타일이 적용된 빈 span 삽입
                const span = document.createElement('span'); 
                span.style.fontSize = val + 'pt'; 
                span.innerHTML = '&#8203;'; // 제로 너비 공백
                range.insertNode(span);
                
                const newRange = document.createRange(); 
                newRange.setStart(span.firstChild, 1); 
                newRange.collapse(true);
                sel.removeAllRanges(); 
                sel.addRange(newRange);
            } else {
                // 1. 스타일 적용 전 현재 선택 상태의 마커 삽입 (위치 고정용)
                const startMarker = document.createElement('span');
                startMarker.style.display = 'none';
                startMarker.id = 'temp-selection-start';
                
                const endMarker = document.createElement('span');
                endMarker.style.display = 'none';
                endMarker.id = 'temp-selection-end';

                const rangeClone = range.cloneRange();
                rangeClone.collapse(false);
                rangeClone.insertNode(endMarker);
                
                rangeClone.setStart(range.startContainer, range.startOffset);
                rangeClone.collapse(true);
                rangeClone.insertNode(startMarker);

                // 마커 사이로 선택 영역 다시 설정
                const workRange = document.createRange();
                workRange.setStartAfter(startMarker);
                workRange.setEndBefore(endMarker);
                sel.removeAllRanges();
                sel.addRange(workRange);

                // 2. 브라우저 기본 기능을 이용해 기존 span 분할 및 중첩 방지
                document.execCommand('styleWithCSS', false, true);
                document.execCommand('fontSize', false, "7");

                // 3. 생성된 요소들을 pt 단위로 교체 (In-place 수정)
                const largeNodes = editor.querySelectorAll("span[style*='xxx-large'], span[style*='-webkit-xxx-large'], font[size='7']");
                largeNodes.forEach(node => {
                    if (node.tagName === 'FONT') node.removeAttribute('size');
                    node.style.fontSize = val + 'pt';
                });

                // 4. 마커 위치를 기반으로 Range 복원 (커서 튐 방지)
                const restoreRange = document.createRange();
                restoreRange.setStartAfter(startMarker);
                restoreRange.setEndBefore(endMarker);
                sel.removeAllRanges();
                sel.addRange(restoreRange);

                // 5. 임시 마커 제거
                startMarker.remove();
                endMarker.remove();
            }
            
            window.saveSelection(); 
            window.isFormatting = false;
            window.trackSelection();

        window.handleImageUpload = async (input) => { const files = Array.from(input.files); if (files.length === 0) return; const progress = document.getElementById('upload-progress'); const bar = document.getElementById('upload-bar'); progress.style.display = 'block'; bar.style.width = '0%'; const w = files.length > 1 ? '48%' : '100%'; for (let i = 0; i < files.length; i++) { const file = files[i]; const sref = ref(storage, `notices/${Date.now()}_${file.name}`); try { const utask = uploadBytesResumable(sref, file); await new Promise((res, rej) => { utask.on('state_changed', null, rej, async () => { const url = await getDownloadURL(utask.snapshot.ref); editor.focus(); window.restoreSelection(); const csel = window.getSelection(); if (csel.rangeCount > 0 && !csel.getRangeAt(0).collapsed) csel.getRangeAt(0).collapse(false); const img = `<img src="${url}" draggable="true" style="width: ${w}; max-width: 100%; height: auto; display: inline-block; margin: 0.5rem 1%; vertical-align: top;" referrerpolicy="no-referrer">&nbsp;`; if (!document.execCommand('insertHTML', false, img)) editor.insertAdjacentHTML('beforeend', img); if (csel.rangeCount > 0) window.saveSelection(); bar.style.width = ((i + 1) / files.length) * 100 + '%'; res(); }); }); } catch (e) { window.showModal("실패", "업로드 오류"); } } setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; input.value = ""; window.hideImgOverlay(); window.trackSelection(); }, 500); };

        editor.addEventListener('keydown', (e) => {
            if ((e.key === 'Backspace' || e.key === 'Delete') && currentImg) { e.preventDefault(); window.deleteCurrentImg(); return; }
        });

    </script>
