<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSN MASTER DASHBOARD - 운영진 전용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        /* 에디터 스타일 (기본 11pt 설정) */
        #editor {
            min-height: 500px; padding: 3rem; outline: none; background: #ffffff;
            line-height: 1.8; font-size: 11pt; color: #334155;
            border-radius: 1.5rem; border: 2px solid #f1f5f9; transition: all 0.2s ease;
            box-sizing: border-box; word-break: break-all; overflow-wrap: break-word; position: relative;
        }
        #editor:focus { border-color: #0f172a; box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.1); }
        
        #editor img { 
            max-width: 100% !important; border-radius: 8px; margin: 0.5rem; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            cursor: move; -webkit-user-drag: element; user-drag: element;
        }
        #editor img.selected-img { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4); }
        #editor ul { list-style-type: disc; padding-left: 1.5rem; margin: 1rem 0; }
        
        /* UI 요소 스타일 */
        .admin-tab { padding: 14px 28px; font-weight: 800; cursor: pointer; color: #94a3b8; transition: 0.2s; border-bottom: 3px solid transparent; }
        .admin-tab.active { color: #0f172a; border-bottom-color: #0f172a; }
        .toolbar-group { display: flex; align-items: center; background: #f8fafc; border-radius: 0.75rem; padding: 4px; gap: 2px; border: 1px solid #f1f5f9; }
        .toolbar-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; transition: all 0.2s; color: #64748b; cursor: pointer; }
        .toolbar-btn:hover { background: #ffffff; color: #0f172a; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .toolbar-btn.active { background: #0f172a; color: #ffffff; } 
        
        /* 하이브리드 글꼴 크기 입력기 커스텀 드롭다운 디자인 */
        .font-size-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0 4px 0 8px; height: 38px; }
        .font-size-input { width: 36px; border: none; outline: none; font-weight: 800; text-align: center; font-size: 0.9rem; background: transparent; }
        .font-size-input::-webkit-outer-spin-button, .font-size-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        #font-size-popup { display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); z-index: 100; background: white; border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 60px; max-height: 250px; overflow-y: auto; padding: 4px 0; }
        #font-size-popup.show { display: block; }
        #font-size-popup::-webkit-scrollbar { width: 4px; }
        #font-size-popup::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .font-size-item { padding: 8px 0; font-size: 13px; font-weight: 700; color: #475569; cursor: pointer; text-align: center; transition: all 0.2s; }
        .font-size-item:hover { background-color: #f1f5f9; color: #0f172a; }

        .color-palette-wrap { position: relative; }
        .custom-trigger { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0; }
        
        /* 한글/워드 스타일 전문 색상 팝업 */
        #color-popup { 
            display: none; position: absolute; top: 50px; left: -140px; z-index: 100; 
            background: white; border: 1px solid #cbd5e1; border-radius: 12px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.2); padding: 16px; width: 320px; 
        }
        #color-popup.show { display: block; }
        .color-section-title { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* 테마 색상 (수직 기둥형) */
        .color-grid-theme { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin-bottom: 16px; }
        /* 표준 색상 (한 줄) */
        .color-grid-standard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
        
        .color-cell { width: 100%; aspect-ratio: 1; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.1s; }
        .color-cell:hover { transform: scale(1.2); z-index: 10; border-color: rgba(0,0,0,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        
        .applicant-card { background: white; border-radius: 2rem; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.02); transition: all 0.3s; }
        .applicant-card:hover { border-color: #0f172a; transform: translateY(-3px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        .search-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 44px; transition: all 0.2s; }
        .search-box:focus-within { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05); }
        .search-input { border: none; outline: none; padding-left: 8px; font-size: 0.9rem; font-weight: 600; width: 100%; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #upload-progress { display: none; width: 100%; height: 4px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin-top: 10px; }
        #upload-bar { width: 0%; height: 100%; background: #0f172a; transition: width 0.3s; }

        /* 8방향 이미지 리사이즈 오버레이 디자인 */
        #img-resize-overlay { display: none; position: absolute; border: 2px solid #3b82f6; z-index: 40; pointer-events: none; }
        .resize-handle { position: absolute; width: 12px; height: 12px; background: white; border: 2px solid #3b82f6; pointer-events: auto; }
        .handle-nw { top: -7px; left: -7px; cursor: nwse-resize; }
        .handle-ne { top: -7px; right: -7px; cursor: nesw-resize; }
        .handle-sw { bottom: -7px; left: -7px; cursor: nesw-resize; }
        .handle-se { bottom: -7px; right: -7px; cursor: nwse-resize; }
    </style>
</head>
<body class="p-4 md:p-10 relative">

    <div id="custom-modal" class="hidden fixed inset-0 z-[9999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div id="modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h3 id="modal-title" class="text-xl font-black text-[#0f172a] mb-2">알림</h3>
            <p id="modal-desc" class="text-slate-500 font-bold mb-8 whitespace-pre-wrap leading-relaxed"></p>
            <div id="modal-buttons" class="flex gap-3 justify-center"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-[#0f172a] p-8 rounded-[2.5rem] shadow-2xl text-white">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center"><i data-lucide="shield-check" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white uppercase italic">GSN MASTER.</h1>
                    <p class="text-blue-300/60 text-[10px] font-bold uppercase tracking-widest mt-0.5">Control Tower</p>
                </div>
            </div>
            <div id="auth-status" class="hidden">
                <button id="logout-btn" type="button" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-xl text-sm font-bold transition border border-white/10">LOGOUT</button>
            </div>
        </div>

        <div id="login-section" class="max-w-md mx-auto bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black mb-8 text-center text-[#0f172a] uppercase italic">System Access</h2>
            <div id="login-form" class="space-y-5">
                <!-- 아이디 입력창 -->
                <input type="text" id="admin_id_input" placeholder="ADMIN ID" autocomplete="off" class="w-full p-4 rounded-2xl border-2 border-slate-50 outline-none focus:border-[#0f172a] bg-slate-50 transition font-bold text-sm">
                
                <!-- 비밀번호 입력창 (특수 처리) -->
                <input type="text" id="admin_pw_input" placeholder="PASSWORD" autocomplete="off" spellcheck="false" style="-webkit-text-security: disc;" class="w-full p-4 rounded-2xl border-2 border-slate-50 outline-none focus:border-[#0f172a] bg-slate-50 transition font-bold">
                
                <button id="login-btn" type="button" onclick="window.executeLogin()" class="w-full bg-[#0f172a] text-white p-5 rounded-2xl font-black text-lg hover:bg-black transition shadow-xl uppercase">Login</button>
            </div>
        </div>

        <div id="admin-content" class="hidden space-y-8 fade-in">
            <div class="flex gap-4 border-b border-slate-200 mb-8">
                <div onclick="window.switchTab('notice')" id="tab-notice" class="admin-tab active">📢 공지사항 관리</div>
                <div onclick="window.switchTab('applicant')" id="tab-applicant" class="admin-tab">👥 지원자 통합 관리</div>
            </div>

            <div id="section-notice" class="space-y-8">
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                    <div class="grid md:grid-cols-3 gap-6 mb-8">
                        <select id="notice-category" class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-[#0f172a] bg-slate-50 font-black">
                            <option value="지원공고">📢 지원공고</option>
                            <option value="네트워킹">🤝 네트워킹</option>
                            <option value="일반소식">📰 일반소식</option>
                        </select>
                        <input type="text" id="notice-title" placeholder="공지 제목을 입력하세요" class="md:col-span-2 w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-[#0f172a] bg-slate-50 font-bold">
                    </div>

                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-6 space-y-4 relative z-20">
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="toolbar-group">
                                <button id="btn-bold" type="button" onmousedown="event.preventDefault(); window.formatDoc('bold');" class="toolbar-btn" title="굵게"><i data-lucide="bold" class="w-4 h-4"></i></button>
                                <button type="button" onmousedown="event.preventDefault(); window.formatDoc('insertUnorderedList');" class="toolbar-btn" title="글머리 기호"><i data-lucide="list" class="w-4 h-4"></i></button>
                            </div>
                            
                            <!-- 하이브리드 글꼴 입력기 -->
                            <div class="font-size-box relative">
                                <input type="number" id="font-size-val" value="11" min="1" max="100" onchange="window.applyFontSize(this.value)" class="font-size-input" title="글꼴 크기 직접 입력">
                                <span class="text-[10px] font-black text-slate-400 mr-2 uppercase">pt</span>
                                <div class="h-4 w-px bg-slate-200 mx-1"></div>
                                <div class="relative flex items-center justify-center w-5 h-full cursor-pointer group" onmousedown="event.preventDefault(); window.toggleFontSizePopup();" title="글꼴 크기 선택">
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 group-hover:text-slate-700 pointer-events-none transition-colors"></i>
                                </div>
                                <div id="font-size-popup" class="fade-in"></div>
                            </div>

                            <div class="toolbar-group">
                                <button id="btn-align-left" type="button" onmousedown="event.preventDefault(); window.formatDoc('justifyLeft');" class="toolbar-btn" title="왼쪽 정렬"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                                <button id="btn-align-center" type="button" onmousedown="event.preventDefault(); window.formatDoc('justifyCenter');" class="toolbar-btn" title="가운데 정렬"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                                <button id="btn-align-right" type="button" onmousedown="event.preventDefault(); window.formatDoc('justifyRight');" class="toolbar-btn" title="오른쪽 정렬"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                            </div>
                            
                            <div class="color-palette-wrap flex items-center gap-2">
                                <div id="selected-preview" class="custom-trigger bg-black" onmousedown="event.preventDefault(); window.togglePalette();" title="글꼴 색상"></div>
                                
                                <div id="color-popup" class="fade-in">
                                    <div class="flex justify-between items-center mb-3">
                                        <div class="color-section-title">테마 및 변형 색상</div>
                                        <div onclick="document.getElementById('custom-color-picker').click();" class="p-1 hover:bg-slate-100 rounded cursor-pointer transition" title="스포이트 (RGB 직접 지정)">
                                            <i data-lucide="pipette" class="w-4 h-4 text-slate-500"></i>
                                        </div>
                                    </div>
                                    <div class="color-grid-theme" id="theme-colors-grid"></div>
                                    <div class="color-section-title">표준 색상</div>
                                    <div class="color-grid-standard" id="standard-colors-grid"></div>
                                    <input type="color" id="custom-color-picker" class="hidden" onchange="window.applyColor(this.value)">
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <div class="flex items-center gap-4">
                                <label class="cursor-pointer bg-[#0f172a] text-white px-6 py-2.5 rounded-lg font-black text-sm hover:bg-black transition-all">
                                    이미지 업로드
                                    <input type="file" id="image-upload" class="hidden" accept="image/*" multiple onchange="window.handleImageUpload(this)">
                                </label>
                                <p class="text-xs text-slate-400 font-bold">내 컴퓨터의 사진을 선택하면 본문에 자동 삽입됩니다. (여러 장 선택 가능)</p>
                            </div>
                            <div id="upload-progress"><div id="upload-bar"></div></div>
                        </div>
                    </div>

                    <div class="relative w-full" id="editor-container">
                        <div id="img-toolbar" class="hidden absolute z-50 bg-[#0f172a] text-white rounded-xl shadow-2xl p-1.5 flex items-center gap-1 transition-all border border-slate-700">
                            <button type="button" onmousedown="event.preventDefault(); window.alignImg('left');" class="p-2 hover:bg-slate-700 rounded-lg transition" title="왼쪽 정렬 (나란히 배치)"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                            <button type="button" onmousedown="event.preventDefault(); window.alignImg('center');" class="p-2 hover:bg-slate-700 rounded-lg transition" title="가운데 정렬"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                            <button type="button" onmousedown="event.preventDefault(); window.alignImg('right');" class="p-2 hover:bg-slate-700 rounded-lg transition" title="오른쪽 정렬 (나란히 배치)"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                            <div class="w-px h-5 bg-slate-600 mx-1"></div>
                            <div class="flex items-center px-1" title="픽셀(px) 단위 크기">
                                <input type="number" id="img-width-input" class="w-16 h-7 bg-slate-800 text-white text-xs font-bold text-center rounded outline-none border border-slate-600 focus:border-blue-400" onmousedown="event.stopPropagation();" onchange="window.resizeImg(this.value + 'px')">
                                <span class="text-xs ml-1 text-slate-300">px</span>
                            </div>
                            <div class="w-px h-5 bg-slate-600 mx-1"></div>
                            <button type="button" onmousedown="event.preventDefault(); window.deleteCurrentImg();" class="p-2 text-red-400 hover:text-white hover:bg-red-500 rounded-lg transition" title="이미지 삭제 (Delete키 가능)"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        
                        <div id="img-resize-overlay">
                            <div class="resize-handle handle-nw" data-pos="nw"></div>
                            <div class="resize-handle handle-ne" data-pos="ne"></div>
                            <div class="resize-handle handle-sw" data-pos="sw"></div>
                            <div class="resize-handle handle-se" data-pos="se"></div>
                        </div>

                        <div id="editor" contenteditable="true"></div>
                    </div>
                    
                    <input type="hidden" id="edit-id">
                    <div class="flex gap-4 mt-10">
                        <button id="save-btn" type="button" class="flex-1 bg-[#0f172a] text-white p-6 rounded-2xl font-black text-xl hover:bg-black transition shadow-xl">PUBLISH NOTICE</button>
                        <button id="cancel-edit-btn" onclick="window.cancelEdit()" type="button" class="hidden px-12 bg-slate-100 text-slate-500 rounded-2xl font-black transition">CANCEL</button>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="font-black text-slate-400 uppercase text-xs">Notice List</h3>
                    <div class="search-box w-64 bg-white"><i data-lucide="search" class="w-4 h-4 text-slate-300"></i><input type="text" oninput="window.filterNotices(this.value)" placeholder="공지 제목 검색" class="search-input"></div>
                </div>
                <div id="manage-list" class="grid md:grid-cols-2 gap-4 pb-20"></div>
            </div>

            <div id="section-applicant" class="hidden space-y-6">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                    <h2 class="text-3xl font-black text-[#0f172a]">지원자 통합 현황</h2>
                    <div class="flex bg-white p-1 rounded-xl border border-slate-200">
                        <button onclick="window.setApplicantType('전체')" class="app-filter-btn active px-4 py-2 rounded-lg text-xs font-black" id="filter-all">전체</button>
                        <button onclick="window.setApplicantType('창업자')" class="app-filter-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400" id="filter-founder">창업자</button>
                        <button onclick="window.setApplicantType('전문가')" class="app-filter-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400" id="filter-expert">전문가</button>
                    </div>
                </div>
                <div id="applicant-list" class="grid gap-6 pb-20"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCr3Gv_Tij97ZOyiScptXxiPnzhZ9XTYc",
            authDomain: "gsnetwork.firebaseapp.com",
            projectId: "gsnetwork",
            storageBucket: "gsnetwork.firebasestorage.app",
            messagingSenderId: "627864872176",
            appId: "1:627864872176:web:cafd0d1dae27097be04e35"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appId = "gsnetwork"; 
        const editor = document.getElementById('editor');

        let allApplicants = [];
        let allNotices = [];
        let currentApplicantType = '전체';
        let inactivityTimeout;
        let savedRange = null;

        // ==========================================
        // 1. 에디터 엔진 및 기능 (pt 단위 글꼴 포함)
        // ==========================================

        window.saveSelection = () => {
            const sel = window.getSelection();
            if (sel.rangeCount > 0 && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }
        };

        window.restoreSelection = () => { 
            if (savedRange) { 
                const sel = window.getSelection(); 
                sel.removeAllRanges(); sel.addRange(savedRange); 
            }
        };

        window.applyFontSize = (val) => {
            if (!val) return;
            editor.focus(); window.restoreSelection();
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            if (range.collapsed) {
                const span = document.createElement('span'); span.style.fontSize = val + 'pt'; span.innerHTML = '&#8203;';
                range.insertNode(span);
                const newRange = document.createRange(); newRange.setStart(span.firstChild, 1); newRange.collapse(true);
                sel.removeAllRanges(); sel.addRange(newRange); savedRange = newRange.cloneRange();
            } else {
                document.execCommand('fontSize', false, "7");
                const fonts = editor.querySelectorAll("font[size='7']");
                fonts.forEach(f => { f.removeAttribute('size'); f.style.fontSize = val + 'pt'; });
                savedRange = sel.getRangeAt(0).cloneRange();
            }
            window.trackSelection();
        };

        window.trackSelection = () => {
            if (document.activeElement !== editor) return;
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                let node = sel.getRangeAt(0).commonAncestorContainer;
                if (node.nodeType === 3) node = node.parentNode; 
                if (editor.contains(node) || node === editor) savedRange = sel.getRangeAt(0).cloneRange();
                document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
                document.getElementById('btn-align-left').classList.toggle('active', document.queryCommandState('justifyLeft'));
                document.getElementById('btn-align-center').classList.toggle('active', document.queryCommandState('justifyCenter'));
                document.getElementById('btn-align-right').classList.toggle('active', document.queryCommandState('justifyRight'));
                if (node && editor.contains(node)) {
                    const computedStyle = window.getComputedStyle(node);
                    document.getElementById('font-size-val').value = Math.round(parseFloat(computedStyle.fontSize) * 0.75);
                }
            }
        };

        window.formatDoc = (command, value = null) => { document.execCommand(command, false, value); editor.focus(); window.trackSelection(); };

        const fontSizesList = [6, 7, 8, 9, 10, 11, 12, 14, 15, 16, 18, 20, 24, 32, 48, 72];
        window.initFontSizePopup = () => {
            const popup = document.getElementById('font-size-popup'); popup.innerHTML = '';
            fontSizesList.forEach(size => {
                const div = document.createElement('div'); div.className = 'font-size-item'; div.innerText = size;
                div.onmousedown = (e) => e.preventDefault(); 
                div.onclick = () => { document.getElementById('font-size-val').value = size; window.applyFontSize(size); popup.classList.remove('show'); };
                popup.appendChild(div);
            });
        };
        window.toggleFontSizePopup = () => { document.getElementById('font-size-popup').classList.toggle('show'); document.getElementById('color-popup').classList.remove('show'); };

        const themeBases = ['#ffffff', '#000000', '#eeece1', '#1f497d', '#4f81bd', '#c0504d', '#9bbb59', '#8064a2', '#4bacc6', '#f79646'];
        const standardColorsList = ['#000000', '#ff0000', '#ffc000', '#ffff00', '#92d050', '#00b050', '#00b0f0', '#0070c0', '#002060', '#7030a0'];

        function generateShades(hex) {
            const shades = []; const factors = [0.8, 0.6, 0.4, 0, -0.25, -0.5];
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            factors.forEach(f => {
                let nr, ng, nb;
                if (f > 0) { nr = Math.round(r + (255 - r) * f); ng = Math.round(g + (255 - g) * f); nb = Math.round(b + (255 - b) * f); }
                else { nr = Math.round(r * (1 + f)); ng = Math.round(g * (1 + f)); nb = Math.round(b * (1 + f)); }
                shades.push(`#${nr.toString(16).padStart(2, '0')}${ng.toString(16).padStart(2, '0')}${nb.toString(16).padStart(2, '0')}`);
            });
            return shades;
        }

        window.initPalette = () => {
            const themeGrid = document.getElementById('theme-colors-grid'); const standardGrid = document.getElementById('standard-colors-grid');
            themeGrid.innerHTML = ''; standardGrid.innerHTML = '';
            const themeMatrix = themeBases.map(base => generateShades(base));
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 10; col++) {
                    const color = themeMatrix[col][row]; const d = document.createElement('div'); d.className = 'color-cell'; d.style.background = color;
                    d.onmousedown = (e) => e.preventDefault(); d.onclick = () => window.applyColor(color); themeGrid.appendChild(d);
                }
            }
            standardColorsList.forEach(color => { const d = document.createElement('div'); d.className = 'color-cell'; d.style.background = color; d.onmousedown = (e) => e.preventDefault(); d.onclick = () => window.applyColor(color); standardGrid.appendChild(d); });
        };

        window.applyColor = (color) => { if (!color) return; editor.focus(); window.restoreSelection(); document.execCommand('foreColor', false, color); document.getElementById('selected-preview').style.background = color; document.getElementById('color-popup').classList.remove('show'); window.trackSelection(); };
        window.togglePalette = () => { document.getElementById('color-popup').classList.toggle('show'); document.getElementById('font-size-popup').classList.remove('show'); };

        // ==========================================
        // 2. 로그인 및 시스템 연동 (엔터키 처리 포함)
        // ==========================================

        // [보완] 로그인 처리 함수
        window.executeLogin = async () => {
            const e = document.getElementById('admin_id_input').value.trim();
            const p = document.getElementById('admin_pw_input').value.trim();
            if(!e || !p) return window.showModal("알림", "아이디와 비밀번호를 모두 입력해주세요.");
            try { 
                await setPersistence(auth, browserSessionPersistence);
                await signInWithEmailAndPassword(auth, e, p); 
                document.getElementById('admin_id_input').value = "";
                document.getElementById('admin_pw_input').value = "";
            } catch (err) { window.showModal("실패", "계정 정보가 일치하지 않습니다."); }
        };

        // [보완] 아이디와 비밀번호 입력창에서 엔터키 입력 시 로그인 실행
        document.querySelectorAll('#admin_id_input, #admin_pw_input').forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.executeLogin();
                }
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                document.getElementById('auth-status').classList.remove('hidden');
                window.initPalette(); window.initFontSizePopup();
                ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(n => document.addEventListener(n, resetTimer));
                resetTimer();
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), orderBy("createdAt", "desc")), (snap) => {
                    allNotices = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderNotices();
                });
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'applications'), orderBy("createdAt", "desc")), (snap) => {
                    allApplicants = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderApplicants();
                });
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
                document.getElementById('auth-status').classList.add('hidden');
                clearTimeout(inactivityTimeout);
            }
            lucide.createIcons();
        });

        // ==========================================
        // 3. 에디터 및 이미지 핸들링 (기존 로직 유지)
        // ==========================================

        document.addEventListener('selectionchange', window.trackSelection);

        editor.addEventListener('keydown', (e) => {
            if ((e.key === 'Backspace' || e.key === 'Delete') && currentImg) { e.preventDefault(); window.deleteCurrentImg(); return; }
            if (e.key === 'Enter' && document.activeElement === editor) {
                const targetFontSize = document.getElementById('font-size-val').value;
                const isBold = document.getElementById('btn-bold').classList.contains('active');
                setTimeout(() => {
                    const sel = window.getSelection(); if (!sel.rangeCount) return;
                    let node = sel.getRangeAt(0).commonAncestorContainer; if (node.nodeType === 3) node = node.parentNode;
                    if (editor.contains(node)) {
                        const computedStyle = window.getComputedStyle(node);
                        if (Math.round(parseFloat(computedStyle.fontSize) * 0.75) != targetFontSize) window.applyFontSize(targetFontSize);
                        if (isBold && (computedStyle.fontWeight === '400' || computedStyle.fontWeight === 'normal')) window.formatDoc('bold');
                    }
                }, 10); 
            }
        });

        let currentImg = null; let dragSrcEl = null;
        const imgToolbar = document.getElementById('img-toolbar');
        const imgOverlay = document.getElementById('img-resize-overlay');
        const imgWidthInput = document.getElementById('img-width-input');
        let isResizing = false; let activeHandlePos = null; let startX, startWidth;

        editor.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') { if (currentImg) currentImg.classList.remove('selected-img'); currentImg = e.target; currentImg.classList.add('selected-img'); window.updateImgOverlay(); }
            else if (!isResizing) window.hideImgOverlay();
        });

        editor.addEventListener('dragstart', (e) => { if (e.target.tagName === 'IMG') { dragSrcEl = e.target; window.hideImgOverlay(); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', e.target.outerHTML); } });
        editor.addEventListener('dragover', (e) => { if (dragSrcEl) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; } });
        editor.addEventListener('drop', (e) => {
            if (dragSrcEl) {
                e.preventDefault(); let range;
                if (document.caretRangeFromPoint) range = document.caretRangeFromPoint(e.clientX, e.clientY);
                else if (e.rangeParent) { range = document.createRange(); range.setStart(e.rangeParent, e.rangeOffset); }
                if (range) {
                    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); range.insertNode(dragSrcEl);
                    setTimeout(() => { currentImg = dragSrcEl; currentImg.classList.add('selected-img'); window.updateImgOverlay(); dragSrcEl = null; window.trackSelection(); }, 50);
                } else dragSrcEl = null;
            }
        });

        window.updateImgOverlay = () => {
            if (!currentImg) return;
            const imgRect = currentImg.getBoundingClientRect();
            const containerRect = document.getElementById('editor-container').getBoundingClientRect();
            const topPos = imgRect.top - containerRect.top; const leftPos = imgRect.left - containerRect.left;
            imgOverlay.style.display = 'block'; imgOverlay.style.top = topPos + 'px'; imgOverlay.style.left = leftPos + 'px';
            imgOverlay.style.width = imgRect.width + 'px'; imgOverlay.style.height = imgRect.height + 'px';
            imgToolbar.classList.remove('hidden'); imgToolbar.style.top = (topPos - 45) + 'px'; imgToolbar.style.left = leftPos + 'px';
            imgWidthInput.value = parseInt(currentImg.style.width || currentImg.width + 'px');
        };

        window.hideImgOverlay = () => { if (currentImg) currentImg.classList.remove('selected-img'); currentImg = null; imgOverlay.style.display = 'none'; imgToolbar.classList.add('hidden'); };
        window.addEventListener('scroll', () => { if(currentImg) window.updateImgOverlay(); });
        window.addEventListener('resize', () => { if(currentImg) window.updateImgOverlay(); });

        document.querySelectorAll('.resize-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault(); e.stopPropagation(); isResizing = true; activeHandlePos = handle.getAttribute('data-pos');
                startX = e.clientX; startWidth = currentImg.getBoundingClientRect().width;
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing || !currentImg) return;
            e.preventDefault(); let deltaX = e.clientX - startX;
            let newWidth = (activeHandlePos === 'ne' || activeHandlePos === 'se') ? startWidth + deltaX : startWidth - deltaX;
            newWidth = Math.max(50, Math.min(newWidth, editor.clientWidth - 96)); 
            currentImg.style.width = newWidth + 'px'; currentImg.style.height = 'auto'; window.updateImgOverlay(); 
        });

        document.addEventListener('mouseup', () => { if (isResizing) { isResizing = false; editor.focus(); } });

        window.alignImg = (type) => {
            if (!currentImg) return;
            if (type === 'center') { currentImg.style.display = 'block'; currentImg.style.margin = '1.5rem auto'; }
            else { currentImg.style.display = 'inline-block'; currentImg.style.margin = type === 'left' ? '0.5rem 1rem 0.5rem 0' : '0.5rem 0 0.5rem 1rem'; currentImg.style.verticalAlign = 'top'; }
            editor.focus(); setTimeout(window.updateImgOverlay, 50);
        };

        window.resizeImg = (size) => { if (!currentImg) return; currentImg.style.width = size; currentImg.style.height = 'auto'; imgWidthInput.value = parseInt(size); editor.focus(); setTimeout(window.updateImgOverlay, 50); };
        window.deleteCurrentImg = () => { if (!currentImg) return; currentImg.remove(); window.hideImgOverlay(); editor.focus(); };

        window.handleImageUpload = async (input) => {
            const files = Array.from(input.files); if (files.length === 0) return;
            const progressArea = document.getElementById('upload-progress'); const progressBar = document.getElementById('upload-bar');
            progressArea.style.display = 'block'; progressBar.style.width = '0%';
            const widthStyle = files.length > 1 ? '48%' : '100%';
            for (let i = 0; i < files.length; i++) {
                const file = files[i]; const storageRef = ref(storage, `notices/${Date.now()}_${file.name}`);
                try {
                    const uploadTask = uploadBytesResumable(storageRef, file);
                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', null, (err) => reject(err), async () => {
                            const url = await getDownloadURL(uploadTask.snapshot.ref);
                            editor.focus(); window.restoreSelection();
                            const currentSel = window.getSelection(); if (currentSel.rangeCount > 0 && !currentSel.getRangeAt(0).collapsed) currentSel.getRangeAt(0).collapse(false);
                            const imgHTML = `<img src="${url}" draggable="true" style="width: ${widthStyle}; max-width: 100%; height: auto; display: inline-block; margin: 0.5rem 1%; vertical-align: top;" referrerpolicy="no-referrer">&nbsp;`;
                            if (!document.execCommand('insertHTML', false, imgHTML)) editor.insertAdjacentHTML('beforeend', imgHTML);
                            if (currentSel.rangeCount > 0) { savedRange = currentSel.getRangeAt(0).cloneRange(); savedRange.collapse(false); }
                            progressBar.style.width = ((i + 1) / files.length) * 100 + '%'; resolve();
                        });
                    });
                } catch (err) { window.showModal("실패", "이미지 업로드 중 오류 발생"); }
            }
            setTimeout(() => { progressArea.style.display = 'none'; progressBar.style.width = '0%'; input.value = ""; window.hideImgOverlay(); window.trackSelection(); }, 500);
        };

        const resetTimer = () => { clearTimeout(inactivityTimeout); inactivityTimeout = setTimeout(async () => { if (auth.currentUser) { await signOut(auth); window.showToast("자동 로그아웃 되었습니다."); } }, 1000 * 60 * 30); };

        window.showModal = (title, desc, type = 'alert') => {
            return new Promise((resolve) => {
                const m = document.getElementById('custom-modal'); document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerText = desc;
                const btnBox = document.getElementById('modal-buttons'); const iconBox = document.getElementById('modal-icon');
                if (type === 'confirm') {
                    iconBox.className = "w-16 h-16 bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4 rounded-2xl"; iconBox.innerHTML = '<i data-lucide="help-circle" class="w-8 h-8"></i>';
                    btnBox.innerHTML = `<button id="btn-no" class="flex-1 bg-slate-100 py-3.5 rounded-2xl font-black">아니오</button><button id="btn-yes" class="flex-1 bg-red-500 text-white py-3.5 rounded-2xl font-black">예</button>`;
                    document.getElementById('btn-no').onclick = () => { m.classList.add('hidden'); resolve(false); }; document.getElementById('btn-yes').onclick = () => { m.classList.add('hidden'); resolve(true); };
                } else {
                    iconBox.className = "w-16 h-16 bg-blue-50 text-blue-500 flex items-center justify-center mx-auto mb-4 rounded-2xl"; iconBox.innerHTML = '<i data-lucide="info" class="w-8 h-8"></i>';
                    btnBox.innerHTML = `<button id="btn-ok" class="w-full bg-[#0f172a] text-white py-3.5 rounded-2xl font-black">확인</button>`;
                    document.getElementById('btn-ok').onclick = () => { m.classList.add('hidden'); resolve(true); };
                }
                lucide.createIcons(); m.classList.remove('hidden');
            });
        };

        window.switchTab = (target) => {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + target).classList.add('active');
            if(target === 'notice') { document.getElementById('section-notice').classList.remove('hidden'); document.getElementById('section-applicant').classList.add('hidden'); }
            else { document.getElementById('section-notice').classList.add('hidden'); document.getElementById('section-applicant').classList.remove('hidden'); }
        };

        function renderApplicants() {
            let html = "";
            allApplicants.filter(a => currentApplicantType === '전체' || a.type === currentApplicantType).forEach((d) => {
                html += `<div class="applicant-card flex flex-col md:flex-row justify-between items-start gap-8 fade-in"><div class="flex-1 space-y-3 w-full"><div class="flex items-center gap-3"><span class="text-[10px] font-black px-2 py-1 rounded ${d.type === '창업자' ? 'bg-blue-600' : 'bg-purple-600'} text-white uppercase">${d.type}</span><h3 class="text-xl font-bold text-slate-800">${d.name}</h3></div><div class="flex flex-wrap gap-4 text-sm font-bold"><span class="text-blue-600"><i data-lucide="phone" class="w-3.5 h-3.5 inline"></i> ${d.phone}</span><span class="text-slate-500"><i data-lucide="mail" class="w-3.5 h-3.5 inline"></i> ${d.email}</span></div><div class="bg-slate-50 p-5 rounded-2xl text-slate-600 text-sm border border-slate-100 whitespace-pre-wrap mt-4 leading-relaxed">${d.content}</div></div><div class="flex flex-col items-end gap-4 flex-shrink-0"><span class="text-[10px] font-bold text-slate-300 uppercase">${d.date}</span><button onclick="window.deleteApplicant('${d.id}')" class="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
            });
            document.getElementById('applicant-list').innerHTML = html || '<div class="p-20 text-center text-slate-300 italic">내용 없음</div>'; lucide.createIcons();
        }

        window.setApplicantType = (type) => {
            currentApplicantType = type;
            document.querySelectorAll('.app-filter-btn').forEach(btn => { btn.classList.remove('active', 'bg-[#0f172a]', 'text-white'); btn.classList.add('text-slate-400'); });
            const b = document.getElementById(`filter-${type === '전체' ? 'all' : (type === '창업자' ? 'founder' : 'expert')}`);
            b.classList.add('active', 'bg-[#0f172a]', 'text-white'); b.classList.remove('text-slate-400'); renderApplicants();
        };

        window.deleteApplicant = async (id) => { if(await window.showModal("삭제", "정말 삭제하시겠습니까?", "confirm")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'applications', id)); };
        
        function renderNotices() {
            let h = "";
            allNotices.forEach((n) => {
                h += `<div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-lg group hover:border-[#0f172a] transition-all"><div class="flex items-center gap-4 overflow-hidden truncate"><span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${n.category || '기타'}</span><h3 class="font-bold text-slate-800 text-sm truncate">${n.title}</h3></div><div class="flex gap-2 flex-shrink-0"><button onclick="window.editNotice('${n.id}')" class="w-9 h-9 bg-slate-50 text-slate-400 rounded-lg hover:bg-[#0f172a] hover:text-white transition flex items-center justify-center shadow-sm"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="window.deleteNotice('${n.id}')" class="w-9 h-9 bg-red-50 text-red-400 rounded-lg hover:bg-red-500 hover:text-white transition flex items-center justify-center shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
            });
            document.getElementById('manage-list').innerHTML = h; lucide.createIcons();
        }

        document.getElementById('save-btn').onclick = async () => {
            const t = document.getElementById('notice-title').value.trim(); const co = editor.innerHTML; const eid = document.getElementById('edit-id').value;
            if (!t || !co || co === "<br>") return window.showModal("안내", "내용을 입력하세요.");
            const d = { title: t, category: document.getElementById('notice-category').value, content: co, date: new Date().toLocaleDateString('ko-KR') };
            try {
                if (eid) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', eid), { ...d, updatedAt: serverTimestamp() });
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), { ...d, createdAt: serverTimestamp() });
                window.showModal("성공", "정상적으로 저장되었습니다."); window.resetForm();
            } catch(e) { window.showModal("오류", "저장 실패"); }
        };

        window.editNotice = async (id) => {
            const s = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id));
            if (s.exists()) {
                const d = s.data(); document.getElementById('notice-title').value = d.title; editor.innerHTML = d.content;
                document.getElementById('edit-id').value = id; document.getElementById('cancel-edit-btn').classList.remove('hidden'); window.switchTab('notice');
            }
        };

        window.deleteNotice = async (id) => { if(await window.showModal("삭제", "정말 삭제하시겠습니까?", "confirm")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id)); };
        window.resetForm = () => { document.getElementById('notice-title').value = ""; editor.innerHTML = ""; document.getElementById('edit-id').value = ""; document.getElementById('cancel-edit-btn').classList.add('hidden'); window.hideImgOverlay(); };
        window.cancelEdit = async () => { if(await window.showModal("취소", "작성 중인 내용이 사라집니다.", "confirm")) window.resetForm(); };
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        lucide.createIcons();
    </script>
</body>
</html>
