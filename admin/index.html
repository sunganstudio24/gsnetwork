<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSN MASTER DASHBOARD - 운영진 전용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        /* 에디터 스타일 */
        #editor {
            min-height: 500px; padding: 3rem; outline: none; background: #ffffff;
            line-height: 1.8; font-size: 11pt; color: #334155;
            border-radius: 1.5rem; border: 2px solid #f1f5f9; transition: all 0.2s ease;
        }
        #editor:focus { border-color: #0f172a; box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.1); }
        #editor img { 
            max-width: 100%; border-radius: 8px; margin: 1.5rem auto; 
            display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            cursor: pointer; border: 4px solid transparent; transition: all 0.2s;
        }
        /* 선택된 이미지 강조 효과 */
        #editor img.selected-img { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        #editor ul { list-style-type: disc; padding-left: 1.5rem; margin: 1rem 0; }
        #editor b, #editor strong { font-weight: 800; color: inherit; }
        
        /* UI 요소 스타일 */
        .admin-tab { padding: 14px 28px; font-weight: 800; cursor: pointer; color: #94a3b8; transition: 0.2s; border-bottom: 3px solid transparent; }
        .admin-tab.active { color: #0f172a; border-bottom-color: #0f172a; }
        .toolbar-group { display: flex; align-items: center; background: #f8fafc; border-radius: 0.75rem; padding: 4px; gap: 2px; border: 1px solid #f1f5f9; }
        .toolbar-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; transition: all 0.2s; color: #64748b; cursor: pointer; }
        .toolbar-btn:hover { background: #ffffff; color: #0f172a; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .toolbar-btn.active { background: #0f172a; color: #ffffff; }
        .font-size-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0 8px; height: 38px; }
        .font-size-input { width: 40px; border: none; outline: none; font-weight: 800; text-align: center; font-size: 0.9rem; }
        .color-palette-wrap { position: relative; }
        .custom-trigger { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0; }
        #color-popup { display: none; position: absolute; top: 50px; right: 0; z-index: 100; background: white; border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 12px; width: 280px; }
        #color-popup.show { display: block; }
        .color-grid-theme { display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px; margin-bottom: 15px; background: #eee; border: 1px solid #ddd; }
        .color-cell { width: 100%; aspect-ratio: 1.2; cursor: pointer; }
        .applicant-card { background: white; border-radius: 2rem; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.02); transition: all 0.3s; }
        .applicant-card:hover { border-color: #0f172a; transform: translateY(-3px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        .search-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 44px; transition: all 0.2s; }
        .search-box:focus-within { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05); }
        .search-input { border: none; outline: none; padding-left: 8px; font-size: 0.9rem; font-weight: 600; width: 100%; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 업로드 진행 바 UI */
        #upload-progress { display: none; width: 100%; height: 4px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin-top: 10px; }
        #upload-bar { width: 0%; height: 100%; background: #0f172a; transition: width 0.3s; }
    </style>
</head>
<body class="p-4 md:p-10 relative">

    <!-- 커스텀 모달 -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[9999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div id="modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h3 id="modal-title" class="text-xl font-black text-[#0f172a] mb-2">알림</h3>
            <p id="modal-desc" class="text-slate-500 font-bold mb-8 whitespace-pre-wrap leading-relaxed"></p>
            <div id="modal-buttons" class="flex gap-3 justify-center"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <!-- 헤더 -->
        <div class="flex justify-between items-center mb-8 bg-[#0f172a] p-8 rounded-[2.5rem] shadow-2xl text-white">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center"><i data-lucide="shield-check" class="text-white w-6 h-6"></i></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white uppercase italic">GSN MASTER.</h1>
                    <p class="text-blue-300/60 text-[10px] font-bold uppercase tracking-widest mt-0.5">Control Tower</p>
                </div>
            </div>
            <div id="auth-status" class="hidden">
                <button id="logout-btn" type="button" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-xl text-sm font-bold transition border border-white/10">LOGOUT</button>
            </div>
        </div>

        <!-- 로그인 섹션 (크롬 자동완성 무력화) -->
        <div id="login-section" class="max-w-md mx-auto bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black mb-8 text-center text-[#0f172a] uppercase italic">System Access</h2>
            <!-- name 속성을 임의로 설정하여 브라우저 인식 방해 -->
            <form id="login-form" autocomplete="off" onsubmit="event.preventDefault(); window.executeLogin();" class="space-y-5">
                <input autocomplete="false" name="hidden" type="text" style="display:none;">
                
                <input type="text" id="admin_id_input" name="fake_email_123" placeholder="ADMIN ID" autocomplete="new-password" class="w-full p-4 rounded-2xl border-2 border-slate-50 outline-none focus:border-[#0f172a] bg-slate-50 transition font-bold text-sm">
                
                <input type="password" id="admin_pw_input" name="fake_password_456" placeholder="PASSWORD" autocomplete="new-password" class="w-full p-4 rounded-2xl border-2 border-slate-50 outline-none focus:border-[#0f172a] bg-slate-50 transition font-bold">
                
                <button id="login-btn" type="button" onclick="window.executeLogin()" class="w-full bg-[#0f172a] text-white p-5 rounded-2xl font-black text-lg hover:bg-black transition shadow-xl uppercase">Login</button>
            </form>
        </div>

        <!-- 관리 메인 -->
        <div id="admin-content" class="hidden space-y-8 fade-in">
            <div class="flex gap-4 border-b border-slate-200 mb-8">
                <div onclick="window.switchTab('notice')" id="tab-notice" class="admin-tab active">📢 공지사항 관리</div>
                <div onclick="window.switchTab('applicant')" id="tab-applicant" class="admin-tab">👥 지원자 통합 관리</div>
            </div>

            <!-- 공지사항 탭 -->
            <div id="section-notice" class="space-y-8">
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                    <div class="grid md:grid-cols-3 gap-6 mb-8">
                        <select id="notice-category" class="w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-[#0f172a] bg-slate-50 font-black">
                            <option value="지원공고">📢 지원공고</option>
                            <option value="네트워킹">🤝 네트워킹</option>
                            <option value="일반소식">📰 일반소식</option>
                        </select>
                        <input type="text" id="notice-title" placeholder="공지 제목을 입력하세요" class="md:col-span-2 w-full p-4 border-2 border-slate-50 rounded-2xl outline-none focus:border-[#0f172a] bg-slate-50 font-bold">
                    </div>

                    <!-- 에디터 툴바 (이벤트 처리 개선 - onmousedown preventDefault 필수 추가) -->
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-6 space-y-4 relative z-20">
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="toolbar-group">
                                <!-- [수정] onmousedown="event.preventDefault();"를 추가하여 에디터 초점 잃음 방지 -->
                                <button type="button" onmousedown="event.preventDefault();" onclick="window.formatDoc('bold')" class="toolbar-btn" title="굵게"><i data-lucide="bold" class="w-4 h-4"></i></button>
                                <button type="button" onmousedown="event.preventDefault();" onclick="window.formatDoc('insertUnorderedList')" class="toolbar-btn" title="글머리 기호"><i data-lucide="list" class="w-4 h-4"></i></button>
                            </div>
                            <div class="font-size-box">
                                <input type="number" id="font-size-val" value="11" min="1" max="100" onmousedown="event.preventDefault();" onchange="window.applyFontSize(this.value)" class="font-size-input" title="글꼴 크기">
                                <span class="text-[10px] font-black text-slate-300 mr-1 uppercase">pt</span>
                            </div>
                            <div class="toolbar-group">
                                <button type="button" onmousedown="event.preventDefault();" onclick="window.formatDoc('justifyLeft')" class="toolbar-btn" title="왼쪽 정렬"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                                <button type="button" onmousedown="event.preventDefault();" onclick="window.formatDoc('justifyCenter')" class="toolbar-btn" title="가운데 정렬"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                                <button type="button" onmousedown="event.preventDefault();" onclick="window.formatDoc('justifyRight')" class="toolbar-btn" title="오른쪽 정렬"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                            </div>
                            <div class="color-palette-wrap flex items-center gap-2">
                                <div id="selected-preview" class="custom-trigger bg-black" onmousedown="event.preventDefault();" onclick="window.togglePalette()" title="글꼴 색상"></div>
                                <div id="color-popup" class="fade-in">
                                    <div class="color-grid-theme" id="theme-colors"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 이미지 업로드 영역 -->
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <div class="flex items-center gap-4">
                                <label class="cursor-pointer bg-[#0f172a] text-white px-6 py-2.5 rounded-lg font-black text-sm hover:bg-black transition-all">
                                    이미지 업로드
                                    <input type="file" id="image-upload" class="hidden" accept="image/*" onchange="window.handleImageUpload(this)">
                                </label>
                                <p class="text-xs text-slate-400 font-bold">내 컴퓨터의 사진을 선택하면 본문에 자동 삽입됩니다.</p>
                            </div>
                            <div id="upload-progress"><div id="upload-bar"></div></div>
                        </div>
                    </div>

                    <!-- [신규] 에디터 및 이미지 플로팅 툴바 감싸는 영역 -->
                    <div class="relative w-full">
                        <!-- 이미지 전용 미니 툴바 (초기 숨김) -->
                        <div id="img-toolbar" class="hidden absolute z-50 bg-[#0f172a] text-white rounded-xl shadow-2xl p-1.5 flex items-center gap-1 transition-all border border-slate-700">
                            <button type="button" onmousedown="event.preventDefault();" onclick="window.alignImg('left')" class="p-2 hover:bg-slate-700 rounded-lg transition" title="왼쪽 정렬"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                            <button type="button" onmousedown="event.preventDefault();" onclick="window.alignImg('center')" class="p-2 hover:bg-slate-700 rounded-lg transition" title="가운데 정렬"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                            <button type="button" onmousedown="event.preventDefault();" onclick="window.alignImg('right')" class="p-2 hover:bg-slate-700 rounded-lg transition" title="오른쪽 정렬"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                            <div class="w-px h-5 bg-slate-600 mx-1"></div>
                            <button type="button" onmousedown="event.preventDefault();" onclick="window.resizeImg('100%')" class="px-3 py-1.5 text-xs font-black hover:bg-slate-700 rounded-lg transition">100%</button>
                            <button type="button" onmousedown="event.preventDefault();" onclick="window.resizeImg('50%')" class="px-3 py-1.5 text-xs font-black hover:bg-slate-700 rounded-lg transition">50%</button>
                            <button type="button" onmousedown="event.preventDefault();" onclick="window.resizeImg('30%')" class="px-3 py-1.5 text-xs font-black hover:bg-slate-700 rounded-lg transition">30%</button>
                        </div>
                        
                        <div id="editor" contenteditable="true"></div>
                    </div>
                    
                    <input type="hidden" id="edit-id">
                    <div class="flex gap-4 mt-10">
                        <button id="save-btn" type="button" class="flex-1 bg-[#0f172a] text-white p-6 rounded-2xl font-black text-xl hover:bg-black transition shadow-xl">PUBLISH NOTICE</button>
                        <button id="cancel-edit-btn" onclick="window.cancelEdit()" type="button" class="hidden px-12 bg-slate-100 text-slate-500 rounded-2xl font-black transition">CANCEL</button>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="font-black text-slate-400 uppercase text-xs">Notice List</h3>
                    <div class="search-box w-64 bg-white"><i data-lucide="search" class="w-4 h-4 text-slate-300"></i><input type="text" oninput="window.filterNotices(this.value)" placeholder="공지 제목 검색" class="search-input"></div>
                </div>
                <div id="manage-list" class="grid md:grid-cols-2 gap-4 pb-20"></div>
            </div>

            <!-- 지원자 관리 탭 -->
            <div id="section-applicant" class="hidden space-y-6">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                    <h2 class="text-3xl font-black text-[#0f172a]">지원자 통합 현황</h2>
                    <div class="flex bg-white p-1 rounded-xl border border-slate-200">
                        <button onclick="window.setApplicantType('전체')" class="app-filter-btn active px-4 py-2 rounded-lg text-xs font-black" id="filter-all">전체</button>
                        <button onclick="window.setApplicantType('창업자')" class="app-filter-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400" id="filter-founder">창업자</button>
                        <button onclick="window.setApplicantType('전문가')" class="app-filter-btn px-4 py-2 rounded-lg text-xs font-black text-slate-400" id="filter-expert">전문가</button>
                    </div>
                </div>
                <div id="applicant-list" class="grid gap-6 pb-20"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

        // 새로운 계정(gsnetwork) 설정 유지
        const firebaseConfig = {
            apiKey: "AIzaSyCCr3Gv_Tij97ZOyiScptXxiPnzhZ9XTYc",
            authDomain: "gsnetwork.firebaseapp.com",
            projectId: "gsnetwork",
            storageBucket: "gsnetwork.firebasestorage.app",
            messagingSenderId: "627864872176",
            appId: "1:627864872176:web:cafd0d1dae27097be04e35"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appId = "gsnetwork"; 
        const editor = document.getElementById('editor');

        let lastSelection = null;
        let allApplicants = [];
        let allNotices = [];
        let currentApplicantType = '전체';
        let inactivityTimeout;

        /* --- [신규] 이미지 전용 툴바 로직 --- */
        let currentImg = null;
        const imgToolbar = document.getElementById('img-toolbar');

        editor.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') {
                // 기존 선택 해제
                if (currentImg) currentImg.classList.remove('selected-img');
                
                currentImg = e.target;
                currentImg.classList.add('selected-img');
                imgToolbar.classList.remove('hidden');
                
                // 이미지 우측 상단 근처로 툴바 위치 이동
                imgToolbar.style.top = Math.max(0, currentImg.offsetTop - 50) + 'px';
                imgToolbar.style.left = currentImg.offsetLeft + 'px';
            } else {
                // 빈 공간 클릭 시 툴바 숨김 및 선택 해제
                if (currentImg) {
                    currentImg.classList.remove('selected-img');
                    currentImg = null;
                }
                imgToolbar.classList.add('hidden');
            }
        });

        window.alignImg = (type) => {
            if (!currentImg) return;
            if (type === 'center') {
                currentImg.style.display = 'block';
                currentImg.style.margin = '1.5rem auto';
                currentImg.style.float = 'none';
            } else if (type === 'left') {
                currentImg.style.display = 'inline-block';
                currentImg.style.margin = '1rem 1rem 1rem 0';
                currentImg.style.float = 'left';
            } else if (type === 'right') {
                currentImg.style.display = 'inline-block';
                currentImg.style.margin = '1rem 0 1rem 1rem';
                currentImg.style.float = 'right';
            }
            editor.focus();
        };

        window.resizeImg = (size) => {
            if (!currentImg) return;
            currentImg.style.width = size;
            currentImg.style.height = 'auto'; // 비율 유지
            editor.focus();
        };


        /* --- 이미지 직접 업로드 --- */
        window.handleImageUpload = (input) => {
            const file = input.files[0];
            if (!file) return;
            const storageRef = ref(storage, `notices/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);
            const progressArea = document.getElementById('upload-progress');
            const progressBar = document.getElementById('upload-bar');

            progressArea.style.display = 'block';
            uploadTask.on('state_changed', 
                (snap) => { progressBar.style.width = (snap.bytesTransferred / snap.totalBytes) * 100 + '%'; }, 
                () => { window.showModal("실패", "업로드 중 오류 발생"); progressArea.style.display = 'none'; }, 
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then((url) => {
                        window.restoreSelection();
                        // 이미지 삽입 시 기본 100% 꽉 차게 삽입되도록 스타일 추가
                        const imgHTML = `<img src="${url}" style="width: 100%; height: auto;" referrerpolicy="no-referrer">`;
                        document.execCommand('insertHTML', false, imgHTML);
                        progressArea.style.display = 'none'; progressBar.style.width = '0%'; input.value = "";
                    });
                }
            );
        };

        /* --- 보안 기능: 30분 미활동 자동 로그아웃 --- */
        const resetTimer = () => {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(async () => {
                if (auth.currentUser) { await signOut(auth); window.showModal("자동 로그아웃", "보안을 위해 30분간 활동이 없어 로그아웃되었습니다."); }
            }, 1000 * 60 * 30);
        };

        /* --- 로그인 처리 --- */
        window.executeLogin = async () => {
            const e = document.getElementById('admin_id_input').value.trim();
            const p = document.getElementById('admin_pw_input').value.trim();
            if(!e || !p) {
                window.showModal("알림", "아이디와 비밀번호를 모두 입력해주세요.");
                return;
            }
            try { 
                await setPersistence(auth, browserSessionPersistence);
                await signInWithEmailAndPassword(auth, e, p); 
                
                // 로그인 성공 시 입력값 초기화
                document.getElementById('admin_id_input').value = "";
                document.getElementById('admin_pw_input').value = "";
            } catch (err) { window.showModal("실패", "계정 정보가 일치하지 않습니다."); }
        };
        
        // 엔터키 로그인 이벤트 추가
        document.getElementById('admin_pw_input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                window.executeLogin();
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                document.getElementById('auth-status').classList.remove('hidden');
                initPalette();
                ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(n => document.addEventListener(n, resetTimer));
                resetTimer();
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), orderBy("createdAt", "desc")), (snap) => {
                    allNotices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderNotices();
                });
                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'applications'), orderBy("createdAt", "desc")), (snap) => {
                    allApplicants = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderApplicants();
                });
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
                document.getElementById('auth-status').classList.add('hidden');
                clearTimeout(inactivityTimeout);
            }
            lucide.createIcons();
        });

        /* --- 커스텀 모달 제어 --- */
        window.showModal = (title, desc, type = 'alert') => {
            return new Promise((resolve) => {
                const m = document.getElementById('custom-modal');
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-desc').innerText = desc;
                const btnBox = document.getElementById('modal-buttons');
                const iconBox = document.getElementById('modal-icon');

                if (type === 'confirm') {
                    iconBox.className = "w-16 h-16 bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4 rounded-2xl";
                    iconBox.innerHTML = '<i data-lucide="help-circle" class="w-8 h-8"></i>';
                    btnBox.innerHTML = `<button id="btn-no" class="flex-1 bg-slate-100 py-3.5 rounded-2xl font-black">아니오</button><button id="btn-yes" class="flex-1 bg-red-500 text-white py-3.5 rounded-2xl font-black">예</button>`;
                    document.getElementById('btn-no').onclick = () => { m.classList.add('hidden'); resolve(false); };
                    document.getElementById('btn-yes').onclick = () => { m.classList.add('hidden'); resolve(true); };
                } else {
                    iconBox.className = "w-16 h-16 bg-blue-50 text-blue-500 flex items-center justify-center mx-auto mb-4 rounded-2xl";
                    iconBox.innerHTML = '<i data-lucide="info" class="w-8 h-8"></i>';
                    btnBox.innerHTML = `<button id="btn-ok" class="w-full bg-[#0f172a] text-white py-3.5 rounded-2xl font-black">확인</button>`;
                    document.getElementById('btn-ok').onclick = () => { m.classList.add('hidden'); resolve(true); };
                }
                lucide.createIcons(); m.classList.remove('hidden');
            });
        };

        /* --- UI 및 데이터 렌더링 --- */
        window.switchTab = (target) => {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + target).classList.add('active');
            if(target === 'notice') { document.getElementById('section-notice').classList.remove('hidden'); document.getElementById('section-applicant').classList.add('hidden'); }
            else { document.getElementById('section-notice').classList.add('hidden'); document.getElementById('section-applicant').classList.remove('hidden'); }
        };

        function renderApplicants() {
            let html = "";
            allApplicants.filter(a => currentApplicantType === '전체' || a.type === currentApplicantType).forEach((d) => {
                html += `
                    <div class="applicant-card flex flex-col md:flex-row justify-between items-start gap-8 fade-in">
                        <div class="flex-1 space-y-3 w-full">
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-black px-2 py-1 rounded ${d.type === '창업자' ? 'bg-blue-600' : 'bg-purple-600'} text-white uppercase">${d.type}</span>
                                <h3 class="text-xl font-bold text-slate-800">${d.name}</h3>
                            </div>
                            <div class="flex flex-wrap gap-4 text-sm font-bold">
                                <span class="text-blue-600"><i data-lucide="phone" class="w-3.5 h-3.5 inline"></i> ${d.phone}</span>
                                <span class="text-slate-500"><i data-lucide="mail" class="w-3.5 h-3.5 inline"></i> ${d.email}</span>
                            </div>
                            <div class="bg-slate-50 p-5 rounded-2xl text-slate-600 text-sm border border-slate-100 whitespace-pre-wrap mt-4 leading-relaxed">${d.content}</div>
                        </div>
                        <div class="flex flex-col items-end gap-4 flex-shrink-0">
                            <span class="text-[10px] font-bold text-slate-300 uppercase">${d.date}</span>
                            <button onclick="window.deleteApplicant('${d.id}')" class="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('applicant-list').innerHTML = html || '<div class="p-20 text-center text-slate-300 italic">내용 없음</div>';
            lucide.createIcons();
        }

        window.setApplicantType = (type) => {
            currentApplicantType = type;
            document.querySelectorAll('.app-filter-btn').forEach(btn => { btn.classList.remove('active', 'bg-[#0f172a]', 'text-white'); btn.classList.add('text-slate-400'); });
            const b = document.getElementById(`filter-${type === '전체' ? 'all' : (type === '창업자' ? 'founder' : 'expert')}`);
            b.classList.add('active', 'bg-[#0f172a]', 'text-white'); b.classList.remove('text-slate-400'); renderApplicants();
        };

        window.deleteApplicant = async (id) => { if(await window.showModal("삭제", "정말 삭제하시겠습니까?", "confirm")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'applications', id)); };
        
        function renderNotices() {
            let h = "";
            allNotices.forEach((n) => {
                h += `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-lg group hover:border-[#0f172a] transition-all">
                        <div class="flex items-center gap-4 overflow-hidden truncate">
                            <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${n.category || '기타'}</span>
                            <h3 class="font-bold text-slate-800 text-sm truncate">${n.title}</h3>
                        </div>
                        <div class="flex gap-2 flex-shrink-0">
                            <button onclick="window.editNotice('${n.id}')" class="w-9 h-9 bg-slate-50 text-slate-400 rounded-lg hover:bg-[#0f172a] hover:text-white transition flex items-center justify-center shadow-sm"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="window.deleteNotice('${n.id}')" class="w-9 h-9 bg-red-50 text-red-400 rounded-lg hover:bg-red-50 hover:text-red-600 transition flex items-center justify-center shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('manage-list').innerHTML = h; lucide.createIcons();
        }

        /* --- 웹 에디터 기능 --- */
        window.saveSelection = () => { 
            const s = window.getSelection(); 
            if (s.getRangeAt && s.rangeCount > 0) {
                lastSelection = s.getRangeAt(0).cloneRange(); 
            }
        };
        
        window.restoreSelection = () => { 
            if (lastSelection) { 
                const sel = window.getSelection(); 
                sel.removeAllRanges(); 
                sel.addRange(lastSelection); 
            } else {
                editor.focus();
            }
        };

        window.formatDoc = (command, value = null) => {
            window.restoreSelection();
            document.execCommand(command, false, value);
            editor.focus(); 
        };

        window.applyFontSize = (s) => { 
            if(!s) return; 
            window.restoreSelection(); 
            document.execCommand('fontSize', false, "7"); 
            const f = editor.getElementsByTagName("font"); 
            for (let i=0; i<f.length; i++) { 
                if (f[i].size === "7") { 
                    f[i].removeAttribute("size"); 
                    f[i].style.fontSize = s + "pt"; 
                } 
            }
            editor.focus();
        };

        const themeColors = [['#ffffff', '#000000', '#eeece1', '#1f497d', '#4f81bd', '#c0504d', '#9bbb59', '#8064a2', '#4bacc6', '#f79646']];
        function initPalette() {
            const b = document.getElementById('theme-colors'); b.innerHTML = '';
            themeColors[0].forEach(c => { 
                const d = document.createElement('div'); 
                d.className='color-cell'; d.style.background=c; 
                // [수정] 컬러 버튼 클릭 시에도 초점 유지
                d.onmousedown = (e) => e.preventDefault();
                d.onclick = () => { 
                    window.restoreSelection(); 
                    document.execCommand('foreColor', false, c); 
                    document.getElementById('selected-preview').style.background = c; 
                    document.getElementById('color-popup').classList.remove('show'); 
                    editor.focus(); 
                }; 
                b.appendChild(d); 
            });
        }
        window.togglePalette = () => {
            window.saveSelection();
            document.getElementById('color-popup').classList.toggle('show');
        };

        document.getElementById('save-btn').onclick = async () => {
            const t = document.getElementById('notice-title').value.trim();
            const co = editor.innerHTML;
            const eid = document.getElementById('edit-id').value;
            if (!t || !co || co === "<br>") return window.showModal("안내", "내용을 입력하세요.");
            const d = { title: t, category: document.getElementById('notice-category').value, content: co, date: new Date().toLocaleDateString('ko-KR') };
            try {
                if (eid) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', eid), { ...d, updatedAt: serverTimestamp() });
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), { ...d, createdAt: serverTimestamp() });
                window.showModal("성공", "정상적으로 저장되었습니다."); window.resetForm();
            } catch(e) { window.showModal("오류", "저장 실패"); }
        };

        window.editNotice = async (id) => {
            const s = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id));
            if (s.exists()) {
                const d = s.data(); document.getElementById('notice-title').value = d.title; editor.innerHTML = d.content;
                document.getElementById('edit-id').value = id; document.getElementById('cancel-edit-btn').classList.remove('hidden'); window.switchTab('notice');
            }
        };

        window.deleteNotice = async (id) => { if(await window.showModal("삭제", "정말 삭제하시겠습니까?", "confirm")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id)); };
        window.resetForm = () => { document.getElementById('notice-title').value = ""; editor.innerHTML = ""; document.getElementById('edit-id').value = ""; document.getElementById('cancel-edit-btn').classList.add('hidden'); document.getElementById('img-toolbar').classList.add('hidden'); currentImg = null; };
        window.cancelEdit = async () => { if(await window.showModal("취소", "작성 중인 내용이 사라집니다.", "confirm")) window.resetForm(); };
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        editor.addEventListener('mouseup', window.saveSelection);
        editor.addEventListener('keyup', window.saveSelection);
        editor.addEventListener('mouseleave', window.saveSelection); 

        lucide.createIcons();
    </script>
</body>
</html>
